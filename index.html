// COZINHA
// ════════════════════════════════════════════════════════════════════
function Cozinha({setTela,fila,light,toggleTema}){
  const [preparando,setPreparando] = useState([]);

  const mesaCor={};
  [...new Set(fila.map(p=>p.mesa))].forEach((m,i)=>{mesaCor[m]=CORES_MESA[i%CORES_MESA.length];});

  function toggle(pid,iid){
    const k=`${pid}-${iid}`;
    setPreparando(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);
  }
  function finalizar(pid,iid){
    setPreparando(p=>p.filter(x=>x!==`${pid}-${iid}`));
    const pedido = fila.find(p=>p.id===pid);
    if(pedido) finalizarItemFirebase(pid, iid, pedido.itens, pedido);
  }
  // Entregar bebida — não passa por "preparo", sem notificação, registra consumo direto
  function entregarBebida(pid,iid){
    const pedido = fila.find(p=>p.id===pid);
    if(pedido) finalizarItemFirebase(pid, iid, pedido.itens, pedido, true);
  }

  // Cozinha só processa pedidos aprovados pelo caixa
  // Bebidas ficam no caixa — aqui só comida aprovada
  const filaAprovada = fila.filter(p=>p.status==="aprovado");
  const filaBebidas = []; // mantido estruturalmente mas vazio (bebidas foram para o caixa)
  const filaComida = [];
  filaAprovada.forEach(ped=>{
    const comidas = ped.itens.filter(it=>!it.eBebida);
    if(comidas.length>0) filaComida.push({ped, itens:comidas});
  });

  const emPreparo=[];
  filaComida.forEach(({ped,itens})=>itens.forEach(it=>{
    if(preparando.includes(`${ped.id}-${it.id}`)) emPreparo.push({ped,it});
  }));

  // Grid adaptativo: até 12 cards cabem na tela sem rolagem (monitor grande na cozinha)
  const n = emPreparo.length;
  let colsNum, escala;
  if      (n<=1) { colsNum=1; escala=1;    }
  else if (n<=2) { colsNum=2; escala=1;    }
  else if (n<=4) { colsNum=2; escala=0.9;  }
  else if (n<=6) { colsNum=3; escala=0.82; }
  else if (n<=9) { colsNum=3; escala=0.68; }
  else           { colsNum=4; escala=0.58; } // até 12
  const cols = `repeat(${colsNum}, 1fr)`;

  const totalBebidasPendentes = 0; // bebidas foram para o Caixa

  return(
    <div style={{height:"100vh",background:C.bg,color:C.text,
      display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,
        padding:"9px 18px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={()=>setTela("sel")} style={{background:"none",border:"none",
          color:C.muted,cursor:"pointer",fontSize:18,padding:0}}>←</button>
        <span style={{fontSize:20}}>🏎️</span>
        <span style={{fontWeight:900,fontSize:17,color:C.yellow}}>GARAGEM 77</span>
        <span style={{color:C.muted,fontSize:13,marginLeft:2}}>— Cozinha</span>
        <div style={{flex:1}}/>
        <button onClick={toggleTema} style={{background:C.card2,border:`1px solid ${C.kBorder||C.border}`,
          borderRadius:20,padding:"4px 10px",cursor:"pointer",
          fontSize:12,fontWeight:700,color:C.yellow,marginRight:4}}>
          {light?"🌙":"☀️"}
        </button>
        <KTag c="#FFB800">{filaComida.reduce((a,f)=>a+f.itens.length,0)} na fila</KTag>
        <KTag c="#22C55E">{emPreparo.length} preparando</KTag>
      </div>
      {/* Layout — sem coluna de bebidas (foram para o Caixa) */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* FILA LATERAL */}
        <div style={{width:270,flexShrink:0,background:C.card,
          borderRight:`1px solid #272727`,overflowY:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.border}`,
            fontSize:10,textTransform:"uppercase",letterSpacing:1,color:C.muted}}>
            Fila de pedidos (lanches/porções)
          </div>
          {filaComida.length===0 &&
            <div style={{padding:20,color:C.muted,textAlign:"center",fontSize:13,marginTop:16}}>
              Nenhum pedido na fila
            </div>}
          {filaComida.map(({ped,itens})=>(
            <div key={ped.id} style={{borderBottom:`1px solid ${C.border}`,
              borderLeft:`4px solid ${mesaCor[ped.mesa]||C.yellow}`}}>
              {/* Cabeçalho pedido */}
              <div style={{padding:"7px 10px 4px",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <div style={{background:C.yellow,color:"#000",borderRadius:6,
                  padding:"1px 8px",fontSize:13,fontWeight:900}}>
                  #{ped.id}
                </div>
                <div style={{background:(mesaCor[ped.mesa]||C.yellow)+"33",
                  color:mesaCor[ped.mesa]||C.yellow,
                  borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:700}}>
                  {ped.mesa}
                </div>
                {ped.cliente!=="—"&&
                  <div style={{fontSize:10,color:C.muted,flex:1,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {ped.cliente}
                  </div>}
                <div style={{fontSize:10,color:C.muted}}>{ped.hora}</div>
              </div>
              {/* Itens (apenas comida) */}
              {itens.map(it=>{
                const k=`${ped.id}-${it.id}`;
                const on=preparando.includes(k);
                return(
                  <div key={it.id} style={{padding:"5px 10px 6px",
                    display:"flex",alignItems:"center",gap:7,
                    background:on?C.yellow+"11":"transparent"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:on?800:400,
                        color:on?C.yellow:C.text,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {it.item.nome}
                        {it.tamanho&&<span style={{color:C.muted,fontWeight:400,fontSize:10}}> {it.tamanho}</span>}
                      </div>
                      {it.pao&&<div style={{fontSize:10,color:"#A78BFA"}}>🍞 {it.pao}</div>}
                      {it.removidos?.length>0&&
                        <div style={{fontSize:10,color:C.red}}>s/ {it.removidos.join(", ")}</div>}
                      {it.ponto&&<div style={{fontSize:10,color:"#888"}}>🔥 {it.ponto}</div>}
                    </div>
                    <button onClick={()=>toggle(ped.id,it.id)} style={{
                      background:on?C.yellow:"#2A2A2A",border:"none",borderRadius:6,
                      color:on?"#000":C.muted,padding:"4px 8px",
                      cursor:"pointer",fontSize:10,fontWeight:800,whiteSpace:"nowrap"}}>
                      {on?"▶ Fazendo":"▶ Iniciar"}
                    </button>
                  </div>
                );
              })}
            </div>
          ))}
        </div>

        {/* COLUNA CENTRAL: TELA PRINCIPAL (preparo de comida) */}
        <div style={{flex:1,overflow:"hidden",padding:Math.round(14*Math.max(escala,0.7))}}>
          {emPreparo.length===0 ?
            <div style={{height:"100%",display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",gap:12,color:C.muted}}>
              <div style={{fontSize:52}}>🍳</div>
              <div style={{fontSize:16}}>Clique em "Iniciar" na fila ao lado</div>
              <div style={{fontSize:13}}>Os ingredientes aparecem aqui</div>
            </div>
          :
            <div style={{display:"grid",gridTemplateColumns:cols,gridAutoRows:"1fr",
              gap:Math.round(12*escala),height:"100%"}}>
              {emPreparo.map(({ped,it})=>(
                <CardPreparo key={`${ped.id}-${it.id}`} ped={ped} it={it}
                  cor={mesaCor[ped.mesa]||C.yellow} escala={escala}
                  onFinalizar={()=>finalizar(ped.id,it.id)}/>
              ))}
            </div>}
        </div>

      </div>
    </div>
  );
}

function PaoIcon({pao, cortado, escala=1}){
  // Mapeamento de label completo → abreviação
  const abrev = {
    "Mônaco":"Môn","Brioche":"Brio","Bola":"Bola","Francês":"Fran",
    "monaco":"Môn","brioche":"Brio","bola":"Bola","frances":"Fran"
  };
  const sigla = abrev[pao] || pao?.slice(0,4) || "?";
  const tam = Math.max(28, Math.round(40 * escala));
  const fsTam = Math.max(8, Math.round(11 * escala));
  return(
    <div style={{position:"relative",width:tam,height:tam,flexShrink:0}}>
      {/* Círculo do pão */}
      <div style={{width:tam,height:tam,borderRadius:"50%",
        background:"#A78BFA22",border:"2px solid #A78BFA",
        display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:fsTam,fontWeight:900,color:"#C4B5FD",lineHeight:1}}>
        {sigla}
      </div>
      {/* Traço indicando cortado */}
      {cortado &&
        <div style={{position:"absolute",top:"50%",left:"-2px",right:"-2px",
          height:2,background:"#A78BFA",transform:"translateY(-50%)",
          pointerEvents:"none"}}/>}
    </div>
  );
}

function CardPreparo({ped,it,cor,onFinalizar,escala=1}){
  const [verIngredientes,setVerIngredientes] = useState(false);

  // Tamanhos base × escala (arredondados)
  const fs = (base)=>Math.max(9, Math.round(base*escala));
  const pd = (base)=>Math.max(3, Math.round(base*escala));
  const gp = (base)=>Math.max(2, Math.round(base*escala));

  const removidos = it.removidos||[];
  const adicionados = (it.ing||[]).filter(i=>!(it.item.ing||[]).includes(i));

  return(
    <div style={{background:C.card,borderRadius:fs(16),border:`2px solid ${cor}`,
      padding:pd(14),display:"flex",flexDirection:"column",gap:gp(8),
      overflow:"hidden",minHeight:0}}>

      {/* Mesa */}
      <div style={{display:"flex",alignItems:"center",gap:gp(8)}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{background:cor+"33",color:cor,borderRadius:6,
            padding:`3px ${pd(10)}px`,fontSize:fs(14),fontWeight:800,display:"inline-block"}}>
            {ped.mesa}
          </div>
          {ped.cliente!=="—"&&escala>0.7&&
            <div style={{fontSize:fs(11),color:C.muted,marginTop:2,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ped.cliente}</div>}
        </div>
        {escala>0.65 && <div style={{fontSize:fs(11),color:C.muted,flexShrink:0}}>{ped.hora}</div>}
      </div>

      {/* Nome do lanche + pão visual */}
      <div style={{borderBottom:`1px solid ${C.border}`,paddingBottom:pd(8),flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:gp(8)}}>
          {/* Ícone do pão — círculo com abreviação e traço se cortado */}
          {it.pao && <PaoIcon pao={it.pao} cortado={it.cortado} escala={escala}/>}
          <div style={{flex:1,minWidth:0}}>
            {/* Nome do lanche em destaque */}
            <div style={{fontWeight:900,fontSize:fs(17),color:C.yellow,lineHeight:1.2}}>
              {it.item.nome}
              {it.eBebida && it.qtdBebida>1 &&
                <span style={{color:"#4ECDC4",fontWeight:900,fontSize:fs(14)}}> ×{it.qtdBebida}</span>}
              {it.tamanho &&
                <span style={{color:C.muted,fontWeight:400,fontSize:fs(12)}}> — {it.tamanho}</span>}
            </div>
            {/* Subtítulo */}
            {it.item.sub && escala>0.65 &&
              <div style={{color:C.muted,fontSize:fs(10),marginTop:1}}>{it.item.sub}</div>}
          </div>
        </div>

        {/* Tags de preparo: hambúrguer e ponto */}
        {(it.hamburguer||it.ponto)&&
          <div style={{display:"flex",gap:gp(5),flexWrap:"wrap",marginTop:gp(5)}}>
            {it.hamburguer&&<PTag c="#F59E0B" fs={fs(10)}>🥩 {escala>0.7?it.hamburguer:it.hamburguer.split(" ")[0]}</PTag>}
            {it.ponto     &&<PTag c="#FB923C" fs={fs(10)}>🔥 {it.ponto}</PTag>}
          </div>}
      </div>

      {/* Corpo principal — compacto */}
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:gp(6),minHeight:0,overflow:"hidden"}}>

        {/* Observação em destaque */}
        {it.obs&&
          <div style={{background:"#FBBF2425",border:`2px solid #FBBF2488`,
            borderRadius:8,padding:pd(7),color:"#FDE68A",fontSize:fs(12),
            fontWeight:800,display:"flex",alignItems:"flex-start",gap:gp(5),flexShrink:0}}>
            <span style={{fontSize:fs(13),flexShrink:0}}>📝</span>
            <span>{it.obs}</span>
          </div>}

        {/* Copos para bebidas */}
        {it.eBebida && it.copos?.some(c=>c.qtd>0) &&
          <div style={{background:"#4ECDC411",border:"1px solid #4ECDC444",
            borderRadius:8,padding:pd(7),flexShrink:0}}>
            {it.copos.filter(c=>c.qtd>0).map(c=>(
              <div key={c.tipo} style={{fontSize:fs(12),color:"#4ECDC4",fontWeight:700}}>
                🧊 {c.qtd}× {c.tipo}
              </div>
            ))}
          </div>}

        {/* ── VISÃO COMPACTA: só remoções e adicionados em destaque ── */}
        {!verIngredientes && (
          <div style={{display:"flex",flexDirection:"column",gap:gp(4),flex:1}}>
            {removidos.length===0 && adicionados.length===0 ?
              <div style={{color:C.muted,fontSize:fs(11),fontStyle:"italic"}}>
                Padrão — sem alterações
              </div>
            : null}
            {removidos.map(ing=>(
              <div key={ing} style={{display:"flex",alignItems:"center",gap:gp(6),
                padding:`${pd(5)}px ${pd(9)}px`,borderRadius:7,
                background:C.red+"18",border:`1.5px solid ${C.red}55`}}>
                <span style={{fontSize:fs(14),flexShrink:0}}>✕</span>
                <span style={{fontSize:fs(13),fontWeight:800,color:C.red,
                  textDecoration:"line-through",flex:1,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {ing}
                </span>
                <span style={{fontSize:fs(9),color:C.red,fontWeight:900,flexShrink:0}}>RETIRAR</span>
              </div>
            ))}
            {adicionados.map(ing=>(
              <div key={ing} style={{display:"flex",alignItems:"center",gap:gp(6),
                padding:`${pd(5)}px ${pd(9)}px`,borderRadius:7,
                background:"#A78BFA1A",border:"1.5px solid #A78BFA55"}}>
                <span style={{fontSize:fs(14),flexShrink:0,color:"#A78BFA"}}>＋</span>
                <span style={{fontSize:fs(13),fontWeight:700,color:"#C4B5FD",flex:1,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {ing}
                </span>
              </div>
            ))}
          </div>
        )}

        {/* ── VISÃO EXPANDIDA: lista completa de ingredientes ── */}
        {verIngredientes && (()=>{
          const originais = it.item.ing||[];
          const qtdIng = originais.length + adicionados.length;
          const duasCols = qtdIng>6;
          const fatorIng = qtdIng<=6?1 : qtdIng<=10?0.85 : qtdIng<=14?0.72 : 0.62;
          const fsIng = Math.max(8, Math.round(fs(13)*fatorIng));
          const pdIngV = Math.max(2, Math.round(pd(5)*fatorIng));
          const pdIngH = Math.max(4, Math.round(pd(9)*fatorIng));
          const gapIng = Math.max(2, Math.round(gp(4)*fatorIng));
          return(
            <div style={{
              flex:1,minHeight:0,
              display:duasCols?"grid":"flex",
              flexDirection:duasCols?undefined:"column",
              gridTemplateColumns:duasCols?"1fr 1fr":undefined,
              gridAutoRows:duasCols?"min-content":undefined,
              gap:gapIng,alignContent:"start"
            }}>
              {originais.map(ing=>{
                const rem=removidos.includes(ing);
                return(
                  <div key={"o-"+ing} style={{display:"flex",alignItems:"center",gap:Math.max(3,gapIng-1),
                    padding:`${pdIngV}px ${pdIngH}px`,borderRadius:6,
                    background:rem?C.red+"14":C.green+"0E",
                    border:`1px solid ${rem?C.red+"44":C.green+"28"}`,minHeight:0}}>
                    <span style={{fontSize:fsIng,flexShrink:0}}>{rem?"✕":"✓"}</span>
                    <span style={{fontSize:fsIng,fontWeight:600,flex:1,
                      color:rem?C.red:C.text,textDecoration:rem?"line-through":"none",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {ing}
                    </span>
                    {rem&&<span style={{fontSize:Math.max(7,fsIng-3),color:C.red,fontWeight:900,flexShrink:0}}>RETIRAR</span>}
                  </div>
                );
              })}
              {adicionados.map(ing=>(
                <div key={"a-"+ing} style={{display:"flex",alignItems:"center",gap:Math.max(3,gapIng-1),
                  padding:`${pdIngV}px ${pdIngH}px`,borderRadius:6,
                  background:"#A78BFA1A",border:"1px solid #A78BFA55",minHeight:0}}>
                  <span style={{fontSize:fsIng,flexShrink:0,color:"#A78BFA"}}>＋</span>
                  <span style={{fontSize:fsIng,fontWeight:700,flex:1,color:"#C4B5FD",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {ing}
                  </span>
                </div>
              ))}
            </div>
          );
        })()}

        {/* Alerta de remoções (sempre visível mesmo na visão compacta) */}
        {removidos.length>0 && !verIngredientes &&
          <div style={{background:C.red+"14",border:`1px solid ${C.red}44`,
            borderRadius:8,padding:pd(6),color:C.red,fontSize:fs(10),fontWeight:800,flexShrink:0}}>
            ⚠️ SEM: {removidos.join(", ")}
          </div>}
      </div>

      {/* Rodapé: botão ingredientes + botão pronto */}
      <div style={{display:"flex",gap:gp(6),flexShrink:0}}>
        {(it.item.ing||[]).length>0 &&
          <button onClick={()=>setVerIngredientes(v=>!v)} style={{
            flex:1,background:verIngredientes?"#4ECDC422":"transparent",
            border:`1px solid ${verIngredientes?"#4ECDC4":C.border}`,
            borderRadius:9,padding:pd(9),
            color:verIngredientes?"#4ECDC4":C.muted,
            fontWeight:700,fontSize:fs(11),cursor:"pointer"}}>
            {verIngredientes?"▲ Ocultar":"🔍 Ingredientes"}
          </button>}
        <button onClick={onFinalizar} style={{
          flex:2,background:C.green,border:"none",borderRadius:9,padding:pd(11),
          color:"#fff",fontWeight:900,fontSize:fs(13),cursor:"pointer"}}>
          ✓ Pronto!
        </button>
      </div>
    </div>
  );
}

// ── AUTOCOMPLETE CLIENTE
function ClienteAutocomplete({value,clientes,onChange,onSelect}){
  const [aberto,setAberto] = useState(false);
  const sugestoes = value.length>0
    ? clientes.filter(c=>c.nome.toLowerCase().includes(value.toLowerCase())).slice(0,6)
    : [];
  return(
    <div style={{position:"relative",marginTop:8}}>
      <input value={value}
        onChange={e=>{onChange(e.target.value);setAberto(true);}}
        onFocus={()=>setAberto(true)}
        onBlur={()=>setTimeout(()=>setAberto(false),150)}
        placeholder="Nome do cliente…"
        style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,
          borderRadius:8,padding:"8px 11px",color:C.text,fontSize:14,
          boxSizing:"border-box",outline:"none"}}/>
      {aberto && sugestoes.length>0 &&
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:99,
          background:C.card,border:`1px solid ${C.yellow}`,borderRadius:10,
          overflow:"hidden",marginTop:3,boxShadow:"0 8px 24px #0006"}}>
          {sugestoes.map(c=>(
            <button key={c.id} onMouseDown={()=>{onSelect(c);setAberto(false);}} style={{
              width:"100%",padding:"10px 13px",background:"none",border:"none",
              borderBottom:`1px solid ${C.border}`,cursor:"pointer",textAlign:"left",
              display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:C.yellow}}>{c.nome}</div>
                {c.cel&&<div style={{fontSize:11,color:C.muted}}>{c.cel}</div>}
              </div>
              {(c.historico||[]).length>0 &&
                <span style={{fontSize:10,color:C.muted,background:C.card2,
                  borderRadius:10,padding:"1px 6px"}}>
                  {(c.historico||[]).length} pedidos
                </span>}
            </button>
          ))}
        </div>}
    </div>
  );
}

// ── EDITOR DE BEBIDAS (unidades + copos/acompanhamentos)
function BebidaEditor({ativo,setAtivo}){
  function setQtdBebida(n){
    setAtivo(a=>({...a, qtdBebida:Math.max(1,n)}));
  }
  function setCopo(tipo,n){
    setAtivo(a=>({
      ...a,
      copos: a.copos.map(c=>c.tipo===tipo ? {...c,qtd:Math.max(0,n)} : c)
    }));
  }
  const totalCopos = ativo.copos.reduce((s,c)=>s+c.qtd,0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Quantidade de bebidas */}
      <Sec title="Quantidade de bebidas">
        <div style={{display:"flex",alignItems:"center",gap:0,marginTop:6}}>
          <BtnQtd onClick={()=>setQtdBebida(ativo.qtdBebida-1)} disabled={ativo.qtdBebida<=1}>−</BtnQtd>
          <div style={{minWidth:52,textAlign:"center",fontSize:22,fontWeight:900,color:C.yellow}}>
            {ativo.qtdBebida}
          </div>
          <BtnQtd onClick={()=>setQtdBebida(ativo.qtdBebida+1)}>+</BtnQtd>
        </div>
      </Sec>

      {/* Copos / acompanhamentos */}
      <Sec title={`Copos e acompanhamentos${totalCopos>0?" ("+totalCopos+" copos)":""}`}>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:6}}>
          {ativo.copos.map(c=>(
            <div key={c.tipo} style={{display:"flex",alignItems:"center",gap:10,
              background:c.qtd>0?C.yellowDim:C.bg,
              border:`1px solid ${c.qtd>0?C.yellow:C.border}`,
              borderRadius:10,padding:"8px 12px"}}>
              <div style={{flex:1}}>
                <span style={{fontSize:14,fontWeight:c.qtd>0?700:400,
                  color:c.qtd>0?C.yellow:C.text}}>
                  {c.tipo==="Puro"?"🥤":"🧊"} {c.tipo}
                </span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:0}}>
                <BtnQtd onClick={()=>setCopo(c.tipo,c.qtd-1)} disabled={c.qtd<=0}>−</BtnQtd>
                <div style={{minWidth:36,textAlign:"center",fontSize:18,fontWeight:800,
                  color:c.qtd>0?C.yellow:C.muted}}>{c.qtd}</div>
                <BtnQtd onClick={()=>setCopo(c.tipo,c.qtd+1)}>+</BtnQtd>
              </div>
            </div>
          ))}
        </div>
        <div style={{marginTop:8,fontSize:11,color:C.muted,fontStyle:"italic"}}>
          Cada tipo de copo é independente da quantidade de bebidas
        </div>
      </Sec>
    </div>
  );
}

function BtnQtd({children,onClick,disabled}){
  return(
    <button onClick={onClick} disabled={disabled} style={{
      width:36,height:36,borderRadius:8,border:`1px solid ${C.border}`,
      background:disabled?C.card2:C.card,
      color:disabled?C.muted:C.yellow,
      cursor:disabled?"not-allowed":"pointer",
      fontSize:20,fontWeight:800,
      display:"flex",alignItems:"center",justifyContent:"center",
      flexShrink:0}}>
      {children}
    </button>
  );
}

// ── EDITOR DE INGREDIENTES (remover + adicionar com busca)
function IngredientesEditor({ativo,setAtivo}){
  const [abrirAdd,setAbrirAdd] = useState(false);
  const [busca,setBusca]       = useState("");

  // ingredientes do lanche original que ainda estão ativos
  const originais = ativo.item.ing;
  // ingredientes adicionados pelo garçom (não estavam no original)
  const adicionados = ativo.ing.filter(i=>!originais.includes(i));

  const disponiveis = TODOS_INGREDIENTES.filter(i=>
    !ativo.ing.includes(i) &&
    i.toLowerCase().includes(busca.toLowerCase())
  );

  function toggleOriginal(ing){
    const on=ativo.ing.includes(ing);
    setAtivo(a=>({...a,ing:on?a.ing.filter(x=>x!==ing):[...a.ing,ing]}));
  }
  function addIngrediente(ing){
    setAtivo(a=>({...a,ing:[...a.ing,ing]}));
    setBusca("");
  }
  function removerAdicionado(ing){
    setAtivo(a=>({...a,ing:a.ing.filter(x=>x!==ing)}));
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* Ingredientes originais */}
      {originais.length>0 &&
        <div>
          <Lbl>Ingredientes — toque para remover</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:7}}>
            {originais.map(ing=>{
              const on=ativo.ing.includes(ing);
              return(
                <button key={ing} onClick={()=>toggleOriginal(ing)} style={{
                  padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,
                  background:on?C.green+"20":C.red+"18",
                  border:`1.5px solid ${on?C.green:C.red}`,
                  color:on?C.green:C.red,
                  textDecoration:on?"none":"line-through"}}>
                  {on?"✓":"✕"} {ing}
                </button>
              );
            })}
          </div>
        </div>}

      {/* Ingredientes adicionados */}
      {adicionados.length>0 &&
        <div>
          <Lbl>Adicionados</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:7}}>
            {adicionados.map(ing=>(
              <button key={ing} onClick={()=>removerAdicionado(ing)} style={{
                padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,
                background:"#A78BFA22",border:"1.5px solid #A78BFA",color:"#A78BFA"}}>
                + {ing} ✕
              </button>
            ))}
          </div>
        </div>}

      {/* Botão abrir buscador */}
      <button onClick={()=>setAbrirAdd(!abrirAdd)} style={{
        padding:"9px 14px",borderRadius:10,border:`1.5px dashed ${C.yellow}`,
        background:abrirAdd?C.yellowDim:"transparent",
        color:C.yellow,cursor:"pointer",fontWeight:700,fontSize:13,
        display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
        {abrirAdd?"▲ Fechar":"＋ Adicionar ingrediente"}
      </button>

      {/* Painel de busca */}
      {abrirAdd &&
        <div style={{background:C.bg,border:`1px solid ${C.border}`,
          borderRadius:12,padding:10,display:"flex",flexDirection:"column",gap:8}}>
          <input value={busca} onChange={e=>setBusca(e.target.value)}
            placeholder="🔍 Buscar ingrediente…"
            autoFocus
            style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,
              borderRadius:8,padding:"9px 12px",color:C.text,fontSize:14,
              boxSizing:"border-box",outline:"none"}}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:160,overflowY:"auto"}}>
            {disponiveis.length===0 &&
              <div style={{color:C.muted,fontSize:13,padding:6}}>
                {busca?"Nenhum ingrediente encontrado":"Digite para buscar…"}
              </div>}
            {disponiveis.map(ing=>(
              <button key={ing} onClick={()=>addIngrediente(ing)} style={{
                padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",
                background:C.yellow,color:"#000",fontSize:13,fontWeight:700}}>
                + {ing}
              </button>
            ))}
          </div>
        </div>}
    </div>
  );
}

// ── MICRO COMPONENTES
function Lbl({children}){return <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>{children}</div>;}
function Sec({title,children}){return <div><Lbl>{title}</Lbl><div style={{marginTop:7}}>{children}</div></div>;}
function Crd({children,style={}}){return <div style={{background:C.card,borderRadius:12,padding:13,border:`1px solid ${C.border}`,...style}}>{children}</div>;}
function Inp({mt=0,...props}){return <input {...props} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontSize:13,boxSizing:"border-box",marginTop:mt,outline:"none"}}/>;}
function Chip({children,ativo,cor,onClick}){return <button onClick={onClick} style={{padding:"5px 11px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:ativo?cor:C.card2,color:ativo?"#000":C.muted}}>{children}</button>;}
function Pill({children,c}){return <span style={{background:c+"22",color:c,borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:600}}>{children}</span>;}
function KTag({children,c}){return <span style={{background:c+"22",color:c,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{children}</span>;}
function PTag({children,c,fs}){return <span style={{background:c+"22",color:c,borderRadius:6,padding:"3px 8px",fontSize:fs||11,fontWeight:700,whiteSpace:"nowrap"}}>{children}</span>;}
