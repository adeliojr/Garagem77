// Adicional por hambúrguer artesanal de costela (sobre o preço tradicional)
const ADICIONAL_ARTESANAL = {
  11:7, 12:7, 13:7, 14:7, 15:7, 16:7, 17:8, 18:7, 19:7, 20:7, 21:7, 22:0,
};

function precoBase(itemId){
  return PRECOS_PADRAO[itemId] || 0;
}

// Calcula o preço de um item configurado (considera tamanho, artesanal, qtd bebida)
function calcularPrecoItem(item, opcoes){
  opcoes = opcoes || {};
  let preco = precoAtual(item.id);

  // Porção com tamanho específico
  if(opcoes.tamanho && PRECOS_PORCAO_TAMANHO[item.id]){
    const customTam = PRECOS_CUSTOM["tam_"+item.id+"_"+opcoes.tamanho];
    preco = customTam !== undefined ? customTam : (PRECOS_PORCAO_TAMANHO[item.id][opcoes.tamanho] || preco);
  }

  // Hambúrguer artesanal de costela = adicional
  if(opcoes.hamburguer && opcoes.hamburguer.includes("Artesanal")){
    const customAdc = PRECOS_CUSTOM["adc_"+item.id];
    preco += (customAdc !== undefined ? customAdc : (ADICIONAL_ARTESANAL[item.id] || 0));
  }

  // Bebida: multiplica pela quantidade
  if(opcoes.eBebida && opcoes.qtdBebida){
    preco = preco * opcoes.qtdBebida;
  }

  return preco;
}

// Preços customizados sobrescrevem os padrão (vem do Firebase)
let PRECOS_CUSTOM = {};
function precoAtual(itemId){
  return PRECOS_CUSTOM[itemId] !== undefined ? PRECOS_CUSTOM[itemId] : (PRECOS_PADRAO[itemId] || 0);
}
function salvarPrecosFirebase(precos){

// ── FIREBASE: fila de pedidos em tempo real
let syncFila = null;

// Contador sequencial de pedidos (reinicia a cada dia)
function proximoNumeroPedido(cb){
  var hoje = new Date().toISOString().slice(0,10).replace(/-/g,"");
  var ref = db.ref("contadores/"+hoje);
  ref.transaction(function(val){ return (val||0)+1; }, function(err,ok,snap){
    cb(ok ? snap.val() : Date.now());
  });
}

function pushPedido(pedido){
  var pedidoLimpo = {
    id: pedido.id,
    mesa: pedido.mesa,
    cliente: pedido.cliente,
    hora: pedido.hora,
    data: pedido.data || "",
    status: pedido.status,
    fechado: false,
    itens: pedido.itens.map(function(it){
      return {
        id: it.id,
        itemId: it.item.id,
        nome: it.item.nome,
        sub: it.item.sub || "",
        cat: it.item.cat,
        ing: it.ing || [],
        ingOriginal: it.item.ing || [],
        removidos: it.removidos || [],
        obs: it.obs || "",
        pao: it.pao || null,
        hamburguer: it.hamburguer || null,
        ponto: it.ponto || null,
        tamanho: it.tamanho || null,
        eBebida: it.eBebida || false,
        qtdBebida: it.qtdBebida || null,
        copos: it.copos || null,
        preco: it.preco || 0,
      };
    })
  };
  db.ref("pedidos/"+pedido.id).set(pedidoLimpo);
}

function finalizarItemFirebase(pedidoId, itemId, itensTotais, pedidoInfo, semNotificar){
  // Notificar o garçom que o lanche está pronto (bebidas não notificam, são entregues direto)
  var itemPronto = itensTotais.find(function(i){ return i.id===itemId; });
  if(itemPronto && pedidoInfo){
    if(!semNotificar){
      var prontoId = pedidoId+"_"+itemId;
      db.ref("prontos/"+prontoId).set({
        id: prontoId,
        pedidoId: pedidoId,
        mesa: pedidoInfo.mesa,
        cliente: pedidoInfo.cliente,
        nome: itemPronto.nome,
        hora: new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
        ts: Date.now()
      });
    }
    // Registrar no CONSUMO da mesa (para fechar conta depois) — não se perde quando a fila esvazia
    registrarConsumo(pedidoInfo, itemPronto);
  }
  // Remover da fila de preparo
  var restantes = itensTotais.filter(function(i){ return i.id!==itemId; });
  if(restantes.length===0){
    db.ref("pedidos/"+pedidoId).remove();
  } else {
    db.ref("pedidos/"+pedidoId+"/itens").set(restantes);
  }
}

// Registra o consumo permanente da mesa/cliente (para fechamento de conta)
function registrarConsumo(pedidoInfo, item){
  var mesaSlug = pedidoInfo.mesa.replace(/[^a-zA-Z0-9]/g,"_");
  var consumoId = "m_"+mesaSlug+"_"+item.id;
  db.ref("consumo/"+consumoId).set({
    id: consumoId,
    pedidoId: pedidoInfo.id,
    mesa: pedidoInfo.mesa,
    cliente: pedidoInfo.cliente || "—",
    nome: item.nome,
    preco: item.preco || 0,
    qtdBebida: item.qtdBebida || null,
    eBebida: item.eBebida || false,
    hora: new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
    data: new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"}),
    ts: Date.now(),
    pago: false
  });
}
function fecharContaFirebase(itemIds){
  // Marca os itens de consumo como pagos (não exclui, mantém histórico)
  itemIds.forEach(function(id){
    db.ref("consumo/"+id+"/pago").set(true);
  });
}
function limparContaPagaFirebase(itemIds){
  // Remove definitivamente após confirmação visual de pagamento
  itemIds.forEach(function(id){
    db.ref("consumo/"+id).remove();
  });
}

function salvarUmClienteFirebase(cliente){
  var clienteLimpo = {
    id: cliente.id,
    nome: cliente.nome || "",
    cel: cliente.cel || "",
    email: cliente.email || "",
    cpf: cliente.cpf || "",
    nascimento: cliente.nascimento || "",
    obs: cliente.obs || "",
    historicoJSON: JSON.stringify(cliente.historico || [])
  };
  db.ref("clientes/c"+cliente.id).set(clienteLimpo);
}
function excluirClienteFirebase(id){
  db.ref("clientes/c"+id).remove();
}

function dispensarPronto(id){
  db.ref("prontos/"+id).remove();
}

// ── MÁSCARAS
function maskTel(v){
  const d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<=2)  return d.length?"("+d:"";
  if(d.length<=6)  return "("+d.slice(0,2)+") "+d.slice(2);
  if(d.length<=10) return "("+d.slice(0,2)+") "+d.slice(2,6)+"-"+d.slice(6);
  return "("+d.slice(0,2)+") "+d.slice(2,7)+"-"+d.slice(7);
}
function maskCPF(v){
  const d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<=3)  return d;
  if(d.length<=6)  return d.slice(0,3)+"."+d.slice(3);
  if(d.length<=9)  return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6);
  return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6,9)+"-"+d.slice(9);
}

function App(){
  const [tela,setTela]   = useState("sel");
  const [fila,setFila]   = useState([]);
  const [prontos,setProntos] = useState([]);
  const [light,setLight] = useState(false);
  const [fbStatus,setFbStatus] = useState("conectando");

  // Atualiza paleta global apenas quando o tema muda (evita loop de render)
  React.useMemo(function(){ C = mkC(light); }, [light]);
  const toggleTema = function(){ setLight(function(l){ return !l; }); };

  // Escutar fila de pedidos em tempo real
  React.useEffect(function(){
    var ref = db.ref("pedidos");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      if(!val){ setFila([]); setFbStatus("ok"); return; }
      var lista = Object.values(val).map(function(p){
        return Object.assign({}, p, {
          itens: (p.itens||[]).map(function(it){
            return Object.assign({}, it, {
              item: { nome: it.nome, sub: it.sub, cat: it.cat, ing: it.ingOriginal||[] }
            });
          })
        });
      }).sort(function(a,b){ return a.id-b.id; });
      setFila(lista);
      setFbStatus("ok");
    }, function(err){ console.error(err); setFbStatus("erro"); });
    return function(){ ref.off("value", handler); };
  }, []);

  // Escutar lanches prontos em tempo real (notificação para o garçom)
  React.useEffect(function(){
    var ref = db.ref("prontos");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      if(!val){ setProntos([]); return; }
      var lista = Object.values(val).sort(function(a,b){ return b.ts-a.ts; });
      setProntos(lista);
    });
    return function(){ ref.off("value", handler); };
  }, []);

  // Escutar clientes em tempo real (persistem entre versões do app)
  const [clientes,setClientes] = useState([]);
  React.useEffect(function(){
    var ref = db.ref("clientes");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      if(!val){ setClientes([]); return; }
      var lista = Object.values(val).map(function(c){
        var hist = [];
        try { hist = JSON.parse(c.historicoJSON || "[]"); } catch(e){ hist = []; }
        return Object.assign({}, c, { historico: hist });
      }).sort(function(a,b){ return (a.nome||"").localeCompare(b.nome||""); });
      setClientes(lista);
    });
    return function(){ ref.off("value", handler); };
  }, []);

  // Escutar consumo (itens entregues, para fechar contas) em tempo real
  const [consumo,setConsumo] = useState([]);
  React.useEffect(function(){
    var ref = db.ref("consumo");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      if(!val){ setConsumo([]); return; }
      var lista = Object.values(val).filter(function(c){ return !c.pago; })
        .sort(function(a,b){ return a.ts-b.ts; });
      setConsumo(lista);
    });
    return function(){ ref.off("value", handler); };
  }, []);

  // Escutar preços customizados em tempo real
  React.useEffect(function(){
    var ref = db.ref("config/precos");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      PRECOS_CUSTOM = val || {};
    });
    return function(){ ref.off("value", handler); };
  }, []);

  return (
    <React.Fragment>
      {fbStatus!=="ok" &&
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:999,
          background:fbStatus==="erro"?"#EF4444":"#FFB800",
          color:fbStatus==="erro"?"#fff":"#000",
          padding:"6px",textAlign:"center",fontSize:12,fontWeight:700}}>
          {fbStatus==="conectando"?"🔄 Conectando ao servidor…":"❌ Erro de conexão"}
        </div>}
      {tela==="sel"       && <Selector setTela={setTela} light={light} toggleTema={toggleTema}/>}
      {tela==="garcom"    && <Garcom     setTela={setTela} fila={fila} prontos={prontos}
        clientes={clientes} setClientes={setClientes} consumo={consumo} light={light} toggleTema={toggleTema}/>}
      {tela==="cozinha"   && <Cozinha    setTela={setTela} fila={fila} light={light} toggleTema={toggleTema}/>}
    </React.Fragment>

  );
}

function Garcom({setTela,fila,prontos,clientes,setClientes,consumo,light,toggleTema}){
  const [aba,setAba] = useState("pedido");
  const [cliente,setCliente] = useState({nome:"",cel:"",email:"",cpf:""});
  const [mesa,setMesa]       = useState(MESAS[0]);
  const [itens,setItens]     = useState([]);
  const [ativo,setAtivo]     = useState(null);
  const [enviado,setEnviado] = useState(false);

  const clienteFiel = clientes.find(c=>
    cliente.nome.length>1 && c.nome.toLowerCase()===cliente.nome.toLowerCase());

  function abrirItem(item){
    const eBebida = item.cat.includes("Bebida");
    setAtivo({
      item, ing:[...item.ing], obs:"",
      pao:       CATS_COM_PAO.includes(item.cat)     ? "monaco" : null,
      hamburguer:CATS_COM_BURGUER.includes(item.cat) ? TIPOS_HAMBURGUER[0] : null,
      ponto:     CATS_COM_PONTO.includes(item.cat)   ? PONTOS[1] : null,
      tamanho:   item.cat.includes("Porção")         ? "Média" : null,
      // bebidas
      eBebida,
      qtdBebida: eBebida ? 1 : null,
      copos: eBebida ? [{tipo:"Puro",qtd:0},{tipo:"Gelo",qtd:0},{tipo:"Limão e Gelo",qtd:0},{tipo:"Laranja e Gelo",qtd:0}] : null,
    });
  }

  function addCarrinho(){
    if(!ativo) return;
    const removidos = ativo.item.ing.filter(i=>!ativo.ing.includes(i));
    const paoLabel  = ativo.pao ? TIPOS_PAO.find(p=>p.id===ativo.pao)?.label : null;
    const preco = calcularPrecoItem(ativo.item, {
      tamanho: ativo.tamanho, hamburguer: ativo.hamburguer,
      eBebida: ativo.eBebida, qtdBebida: ativo.qtdBebida
    });
    setItens(p=>[...p,{id:Date.now(),item:ativo.item,ing:ativo.ing,
      removidos,obs:ativo.obs,pao:paoLabel,
      hamburguer:ativo.hamburguer,ponto:ativo.ponto,tamanho:ativo.tamanho,
      eBebida:ativo.eBebida,qtdBebida:ativo.qtdBebida,copos:ativo.copos,
      preco:preco}]);
    setAtivo(null);
  }

  function enviar(){
    if(!itens.length) return;
    const agora = new Date();
    const dataStr = agora.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
    const horaStr = agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    proximoNumeroPedido(function(num){
      pushPedido({id:num,mesa,cliente:cliente.nome||"—",itens,
        hora:horaStr,data:dataStr,status:"aguardando"});
    });
    // Salvar no histórico do cliente se identificado (persiste no Firebase)
    if(cliente.nome){
      const resumo = itens.map(it=>{
        let s=it.item.nome;
        if(it.removidos?.length) s+=" s/ "+it.removidos.join(", ");
        return s;
      }).join(" + ");
      const clienteAtual = clientes.find(c=>(c.nome||"").toLowerCase()===cliente.nome.toLowerCase());
      if(clienteAtual){
        const novoHist = [...(clienteAtual.historico||[]), {texto:resumo, data:dataStr, hora:horaStr}];
        salvarUmClienteFirebase({...clienteAtual, historico:novoHist});
        // listener Firebase atualiza a lista automaticamente
      }
    }
    setItens([]); setCliente({nome:"",cel:"",email:"",cpf:""});
    setEnviado(true); setTimeout(()=>setEnviado(false),2500);
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,
      maxWidth:440,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,
        padding:"10px 14px",display:"flex",alignItems:"center",gap:10,
        position:"sticky",top:0,zIndex:60}}>
        <button onClick={()=>setTela("sel")} style={{background:"none",border:"none",
          color:C.muted,fontSize:20,cursor:"pointer",padding:0}}>←</button>
        <span style={{fontSize:18}}>🏎️</span>
        <span style={{fontWeight:900,fontSize:15,color:C.yellow}}>GARAGEM 77</span>
        <div style={{flex:1}}/>
        <button onClick={toggleTema} style={{background:C.card2,border:`1px solid ${C.border}`,
          borderRadius:20,padding:"4px 10px",cursor:"pointer",
          fontSize:12,fontWeight:700,color:C.yellow,marginRight:6}}>
          {light?"🌙":"☀️"}
        </button>
        {itens.length>0 &&
          <span style={{background:C.yellow,color:"#000",borderRadius:20,
            padding:"2px 10px",fontSize:12,fontWeight:800}}>
            {itens.length} {itens.length===1?"item":"itens"}
          </span>}
      </div>
      {/* Banner: lanches prontos para entregar */}
      {prontos && prontos.length>0 &&
        <div style={{background:"#22C55E"}}>
          <div style={{padding:"6px 14px 4px",fontSize:10,fontWeight:800,
            color:"#fff",letterSpacing:1,textTransform:"uppercase"}}>
            ✅ Prontos para entregar
          </div>
          {prontos.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,
              padding:"6px 14px 8px",borderTop:"1px solid #16A34A"}}>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontWeight:900,fontSize:14,color:"#fff"}}>{p.nome}</span>
                <span style={{fontSize:12,color:"#dcfce7",marginLeft:8}}>{p.mesa}</span>
                {p.cliente!=="—" &&
                  <span style={{fontSize:11,color:"#bbf7d0",marginLeft:6}}>{p.cliente}</span>}
              </div>
              <button onClick={()=>dispensarPronto(p.id)} style={{
                background:"#16A34A",border:"1px solid #15803d",borderRadius:8,
                padding:"4px 10px",color:"#fff",cursor:"pointer",
                fontSize:12,fontWeight:800,flexShrink:0}}>
                ✓ OK
              </button>
            </div>
          ))}
        </div>}
      {/* Abas */}
      <div style={{display:"flex",background:C.card,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        {[["pedido","🛒 Pedido"],["clientes","👥 Clientes"],["financeiro","💰 Financeiro"],["relatorios","📊 Relatórios"]].map(([id,lb])=>(
          <button key={id} onClick={()=>setAba(id)} style={{

      <div style={{flex:1,overflowY:"auto",padding:14}}>
        {aba==="pedido"     && <PedidoPage {...{mesa,setMesa,cliente,setCliente,clienteFiel,

        {aba==="clientes"   && <ClientesPage clientes={clientes} setClientes={setClientes} fila={fila}/>}
        {aba==="financeiro" && <FinanceiroPage consumo={consumo}/>}
        {aba==="relatorios" && <RelatoriosPage clientes={clientes} fila={fila}/>}

    </div>
  );
}

            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <Lbl>Pedido — {mesa}</Lbl>
              <span style={{fontSize:11,color:C.muted}}>{itens.length} {itens.length===1?"item":"itens"}</span>
            </div>
            {itens.map(it=>(
              <div key={it.id} style={{display:"flex",alignItems:"flex-start",
                gap:8,marginTop:9,paddingTop:9,borderTop:`1px solid ${C.border}`}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.yellow}}>{it.item.nome}</div>
                    {it.eBebida && it.qtdBebida>1 &&
                      <Pill c="#4ECDC4">x{it.qtdBebida}</Pill>}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:3}}>
                    {it.pao        && <Pill c="#A78BFA">🍞 {it.pao}</Pill>}
                    {it.tamanho    && <Pill c="#60A5FA">📏 {it.tamanho}</Pill>}
                    {it.hamburguer && <Pill c="#F59E0B">🥩 {it.hamburguer}</Pill>}
                    {it.ponto      && <Pill c="#FB923C">🔥 {it.ponto}</Pill>}
                    {it.copos?.filter(c=>c.qtd>0).map(c=>(
                      <Pill key={c.tipo} c="#4ECDC4">🧊 {c.tipo} x{c.qtd}</Pill>
                    ))}
                  </div>
                  {it.removidos.length>0 &&
                    <div style={{color:C.red,fontSize:11,marginTop:2}}>s/ {it.removidos.join(", ")}</div>}
                  {it.obs&&<div style={{color:"#aaa",fontSize:11}}>📝 {it.obs}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                  <span style={{fontWeight:800,color:C.yellow,fontSize:13}}>
                    R$ {(it.preco||0).toFixed(2)}
                  </span>
                  <button onClick={()=>setItens(p=>p.filter(x=>x.id!==it.id))} style={{
                    background:C.red+"22",border:"none",color:C.red,
                    borderRadius:6,padding:"2px 7px",cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              marginTop:12,paddingTop:10,borderTop:`2px solid ${C.border}`}}>
              <span style={{fontSize:13,color:C.muted,fontWeight:700}}>TOTAL</span>
              <span style={{fontSize:20,fontWeight:900,color:C.yellow}}>
                R$ {itens.reduce((s,it)=>s+(it.preco||0),0).toFixed(2)}
              </span>
            </div>
            <button onClick={enviar} style={{
              width:"100%",marginTop:14,padding:"13px",borderRadius:12,border:"none",
              background:enviado?C.green:C.yellow,color:enviado?"#fff":"#000",
              cursor:"pointer",fontWeight:900,fontSize:15}}>
              {enviado?"✓ Enviado para Cozinha!":"🚀 Enviar para Cozinha"}
            </button>
          </Crd>}
      </>}
    </div>
  );
}

  );
}

function ClientesPage({clientes,setClientes,fila}){
  const [busca,setBusca]       = useState("");
  const [novo,setNovo]         = useState({nome:"",cel:"",email:"",cpf:""});
  const [aberto,setAberto]     = useState(false);
  const [clienteSel,setClienteSel] = useState(null);

  const lista = clientes.filter(c=>
    c.nome.toLowerCase().includes(busca.toLowerCase())||c.cel.includes(busca));

  // se tem cliente selecionado, mostra ficha dele
  if(clienteSel){
    return <FichaCliente
      cliente={clienteSel}
      fila={fila}
      onVoltar={()=>setClienteSel(null)}
      onSalvar={dados=>{
        salvarUmClienteFirebase(dados);
        setClienteSel(dados);
        // listener Firebase atualiza a lista automaticamente
      }}
      onExcluir={id=>{
        excluirClienteFirebase(id);
        setClienteSel(null);
        // listener Firebase atualiza a lista automaticamente
      }}
    />;
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <Inp placeholder="🔍 Buscar cliente…" value={busca} onChange={e=>setBusca(e.target.value)}/>
      <button onClick={()=>setAberto(!aberto)} style={{
        background:C.yellow,border:"none",borderRadius:10,padding:"10px",
        color:"#000",fontWeight:800,cursor:"pointer"}}>
        + Novo Cliente
      </button>
      {aberto &&
        <Crd style={{borderColor:C.yellow}}>
          <Inp mt={8} placeholder="Nome" value={novo.nome}
            onChange={e=>setNovo(n=>({...n,nome:e.target.value}))}/>
          <Inp mt={8} placeholder="Celular — (00) 00000-0000" value={novo.cel}
            onChange={e=>setNovo(n=>({...n,cel:maskTel(e.target.value)}))}/>
          <Inp mt={8} placeholder="E-mail (opcional)" value={novo.email}
            onChange={e=>setNovo(n=>({...n,email:e.target.value}))}/>
          <Inp mt={8} placeholder="CPF — 000.000.000-00" value={novo.cpf}
            onChange={e=>setNovo(n=>({...n,cpf:maskCPF(e.target.value)}))}/>
          <button onClick={()=>{
            if(!novo.nome) return;
            const novoCliente = {id:Date.now(),...novo,historico:[],nascimento:"",obs:""};
            salvarUmClienteFirebase(novoCliente);
            // listener Firebase atualiza a lista automaticamente
            setNovo({nome:"",cel:"",email:"",cpf:""}); setAberto(false);
          }} style={{marginTop:10,width:"100%",background:C.yellow,border:"none",
            borderRadius:8,padding:10,color:"#000",fontWeight:800,cursor:"pointer"}}>
            Salvar Cliente
          </button>
        </Crd>}
      {lista.map(c=>(
        <button key={c.id} onClick={()=>setClienteSel(c)} style={{
          background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
          padding:"13px",cursor:"pointer",textAlign:"left",width:"100%",color:C.text}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=C.yellow}
          onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:800,color:C.yellow,fontSize:15}}>{c.nome}</div>
              {c.cel  &&<div style={{fontSize:13,color:C.muted,marginTop:2}}>{c.cel}</div>}
              {c.email&&<div style={{fontSize:12,color:C.muted}}>{c.email}</div>}
              {c.cpf  &&<div style={{fontSize:11,color:C.muted}}>CPF: {c.cpf}</div>}
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
              <span style={{background:C.yellowDim,color:C.yellow,borderRadius:20,
                padding:"2px 10px",fontSize:12,fontWeight:700}}>
                {(c.historico||[]).length} pedidos
              </span>
              <span style={{color:C.muted,fontSize:11}}>Ver ficha →</span>
            </div>
          </div>
          {(c.historico||[]).length>0&&
            <div style={{marginTop:6,fontSize:12,color:C.muted}}>
              Último: {(()=>{
                const h=(c.historico||[]);
                const ult=h[h.length-1];
                return (ult&&typeof ult==="object")?ult.texto:(ult||"");
              })()}
            </div>}
        </button>
      ))}
    </div>
  );
}

// ── FICHA DO CLIENTE ──────────────────────────────────────────────
function FichaCliente({cliente,fila,onVoltar,onSalvar,onExcluir}){
  const [editando,setEditando] = useState(false);
  const [form,setForm]         = useState({...cliente});
  const [confirmarDel,setConfirmarDel] = useState(false);

  // pedidos reais deste cliente na fila atual
  const pedidosCliente = fila.filter(p=>
    p.cliente.toLowerCase()===cliente.nome.toLowerCase());

  function salvar(){
    onSalvar(form);
    setEditando(false);
  }

  // Estatísticas rápidas (histórico pode ter formato antigo string ou novo objeto)
  const totalPedidos = (cliente.historico||[]).length + pedidosCliente.length;
  const lanchesFav = {};
  (cliente.historico||[]).forEach(h=>{
    const texto = (h && typeof h==="object") ? (h.texto||"") : (h||"");
    if(!texto) return;
    texto.split(" + ").forEach(parte=>{
      const nome = parte.split(" s/")[0].split(" c/")[0].trim();
      if(nome) lanchesFav[nome] = (lanchesFav[nome]||0)+1;
    });
  });
  pedidosCliente.forEach(p=>p.itens.forEach(it=>{
    const nome = it.item?.nome || it.nome || "";
    if(nome) lanchesFav[nome] = (lanchesFav[nome]||0)+1;
  }));
  const topLanches = Object.entries(lanchesFav).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:0,minHeight:"100%"}}>
      {/* Header ficha */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={onVoltar} style={{background:"none",border:"none",
          color:C.muted,fontSize:20,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:18,color:C.yellow}}>{cliente.nome}</div>
          <div style={{fontSize:11,color:C.muted}}>Ficha do cliente</div>
        </div>
        <button onClick={()=>setEditando(!editando)} style={{
          background:editando?C.yellowDim:"transparent",
          border:`1.5px solid ${C.yellow}`,borderRadius:8,
          padding:"6px 12px",cursor:"pointer",
          color:C.yellow,fontSize:12,fontWeight:700}}>
          {editando?"✕ Cancelar":"✏️ Editar"}
        </button>
      </div>

      {/* Modo edição */}
      {editando ? (
        <Crd style={{borderColor:C.yellow,marginBottom:14}}>
          <Lbl>Dados do cliente</Lbl>
          <Inp mt={10} placeholder="Nome" value={form.nome}
            onChange={e=>setForm(f=>({...f,nome:e.target.value}))}/>
          <Inp mt={8} placeholder="Celular — (00) 00000-0000" value={form.cel}
            onChange={e=>setForm(f=>({...f,cel:maskTel(e.target.value)}))}/>
          <Inp mt={8} placeholder="E-mail" value={form.email||""}
            onChange={e=>setForm(f=>({...f,email:e.target.value}))}/>
          <Inp mt={8} placeholder="CPF — 000.000.000-00" value={form.cpf}
            onChange={e=>setForm(f=>({...f,cpf:maskCPF(e.target.value)}))}/>
          <Inp mt={8} placeholder="Data de nascimento (dd/mm/aaaa)" value={form.nascimento||""}
            onChange={e=>setForm(f=>({...f,nascimento:e.target.value}))}/>
          <textarea value={form.obs||""} onChange={e=>setForm(f=>({...f,obs:e.target.value}))}
            placeholder="Observações (ex: alergia a glúten, cliente VIP…)"
            style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,
              borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13,
              resize:"none",height:64,boxSizing:"border-box",marginTop:8}}/>
          <button onClick={salvar} style={{
            marginTop:12,width:"100%",background:C.yellow,border:"none",
            borderRadius:8,padding:"11px",color:"#000",fontWeight:900,cursor:"pointer",fontSize:14}}>
            ✓ Salvar alterações
          </button>
          <div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
            {!confirmarDel ?
              <button onClick={()=>setConfirmarDel(true)} style={{
                width:"100%",background:"transparent",border:`1px solid ${C.red}`,
                borderRadius:8,padding:"9px",color:C.red,cursor:"pointer",
                fontWeight:700,fontSize:13}}>
                🗑️ Excluir cliente
              </button>
            :
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div style={{color:C.red,fontSize:13,fontWeight:600,textAlign:"center"}}>
                  Confirmar exclusão de {cliente.nome}?
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setConfirmarDel(false)} style={{
                    flex:1,background:"transparent",border:`1px solid ${C.border}`,
                    borderRadius:8,padding:"8px",color:C.muted,cursor:"pointer",fontWeight:600}}>
                    Cancelar
                  </button>
                  <button onClick={()=>onExcluir(cliente.id)} style={{
                    flex:1,background:C.red,border:"none",
                    borderRadius:8,padding:"8px",color:"#fff",cursor:"pointer",fontWeight:800}}>
                    Sim, excluir
                  </button>
                </div>
              </div>}
          </div>
        </Crd>
      ) : (
        /* Modo visualização */
        <>
          {/* Dados */}
          <Crd style={{marginBottom:12}}>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[
                ["📱","Celular",cliente.cel],
                ["✉️","E-mail",cliente.email],
                ["🪪","CPF",cliente.cpf],
                ["🎂","Nascimento",cliente.nascimento],
                ["📝","Obs",cliente.obs],
              ].filter(([,,v])=>v).map(([ic,lb,vl])=>(
                <div key={lb} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{fontSize:15,flexShrink:0}}>{ic}</span>
                  <div>
                    <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:.8}}>{lb}</div>
                    <div style={{fontSize:14,color:C.text,marginTop:1}}>{vl}</div>
                  </div>
                </div>
              ))}
              {!cliente.cel&&!cliente.email&&!cliente.cpf&&
                <div style={{color:C.muted,fontSize:13}}>Nenhum dado de contato cadastrado.</div>}
            </div>
          </Crd>

          {/* Estatísticas */}
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[
              [totalPedidos,"pedidos","#FFB800"],
              [topLanches.length,"lanches fav.","#4ECDC4"],
              [pedidosCliente.length,"hoje","#22C55E"],
            ].map(([n,l,cor])=>(
              <div key={l} style={{flex:1,background:C.card,border:`1px solid ${C.border}`,
                borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:900,color:cor}}>{n}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:1}}>{l}</div>
              </div>
            ))}
          </div>

          {/* Lanches favoritos */}
          {topLanches.length>0 &&
            <Crd style={{marginBottom:12}}>
              <Lbl>🏆 Lanches favoritos</Lbl>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>
                {topLanches.map(([nome,qtd],i)=>(
                  <div key={nome} style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:20,height:20,borderRadius:"50%",
                      background:C.yellowDim,color:C.yellow,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:11,fontWeight:800,flexShrink:0}}>
                      {i+1}
                    </div>
                    <div style={{flex:1,fontSize:14,color:C.text,fontWeight:i===0?700:400}}>{nome}</div>
                    <div style={{fontSize:12,color:C.muted}}>{qtd}x</div>
                    <div style={{width:60,height:4,borderRadius:4,background:C.border,overflow:"hidden"}}>
                      <div style={{height:"100%",background:C.yellow,
                        width:`${Math.round(qtd/topLanches[0][1]*100)}%`}}/>
                    </div>
                  </div>
                ))}
              </div>
            </Crd>}

          {/* Histórico textual — com data de cada pedido */}
          {(cliente.historico||[]).length>0 &&
            <Crd style={{marginBottom:12}}>
              <Lbl>📋 Histórico de pedidos</Lbl>
              <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:8}}>
                {[...(cliente.historico||[])].reverse().map((h,i)=>{
                  const item = (h && typeof h==="object") ? h : {texto:h||"",data:"—",hora:""};
                  const total = (cliente.historico||[]).length;
                  return(
                  <div key={i} style={{padding:"8px 0",
                    borderBottom:i<total-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                      <span style={{fontSize:12,color:C.muted,flexShrink:0}}>#{total-i}</span>
                      <span style={{fontSize:11,color:C.yellow,fontWeight:700,
                        background:C.yellowDim,borderRadius:5,padding:"1px 7px"}}>
                        📅 {item.data}{item.hora?" · "+item.hora:""}
                      </span>
                    </div>
                    <span style={{fontSize:13,color:C.text,paddingLeft:20}}>{item.texto}</span>
                  </div>
                  );
                })}
              </div>
            </Crd>}

          {/* Pedidos ativos hoje */}
          {pedidosCliente.length>0 &&
            <Crd>
              <Lbl>🟢 Pedidos ativos hoje</Lbl>
              {pedidosCliente.map(p=>(
                <div key={p.id} style={{marginTop:10,paddingTop:10,
                  borderTop:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={{background:C.yellow,color:"#000",borderRadius:5,
                      padding:"1px 7px",fontSize:12,fontWeight:900}}>#{p.id}</span>
                    <span style={{fontSize:12,color:C.muted}}>{p.mesa} · {p.hora}</span>
                    <span style={{fontSize:11,color:C.green,marginLeft:"auto",fontWeight:700}}>
                      {p.status}
                    </span>
                  </div>
                  {p.itens.map(it=>(
                    <div key={it.id} style={{fontSize:13,color:C.text,
                      padding:"3px 0 3px 20px"}}>
                      • {it.item.nome}
                      {it.removidos?.length>0 &&
                        <span style={{color:C.red,fontSize:11}}> s/ {it.removidos.join(", ")}</span>}
                    </div>
                  ))}
                </div>
              ))}
            </Crd>}
        </>
      )}
    </div>
  );
}

// FINANCEIRO — fechar conta por mesa ou por pessoa
// ════════════════════════════════════════════════════════════════════
function FinanceiroPage({consumo}){
  const [modo,setModo] = useState("mesas"); // mesas | pessoas | precos
  const [selecionado,setSelecionado] = useState(null); // {tipo:'mesa'|'pessoa', valor:string}
  const [itensMarcados,setItensMarcados] = useState([]); // ids selecionados para fechar parcial

  // Agrupar consumo por mesa
  const porMesa = {};
  consumo.forEach(c=>{
    if(!porMesa[c.mesa]) porMesa[c.mesa] = [];
    porMesa[c.mesa].push(c);
  });

  // Agrupar consumo por pessoa identificada (ignora "—")
  const porPessoa = {};
  consumo.forEach(c=>{
    if(c.cliente && c.cliente!=="—"){
      if(!porPessoa[c.cliente]) porPessoa[c.cliente] = [];
      porPessoa[c.cliente].push(c);
    }
  });

  function totalDe(lista){ return lista.reduce((s,c)=>s+(c.preco||0),0); }

  // Tela de detalhe (mesa ou pessoa selecionada)
  if(selecionado){
    const lista = selecionado.tipo==="mesa" ? (porMesa[selecionado.valor]||[]) : (porPessoa[selecionado.valor]||[]);
    const total = totalDe(lista);
    const todosIds = lista.map(c=>c.id);

    function toggleItem(id){
      setItensMarcados(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
    }
    function marcarTodos(){
      setItensMarcados(todosIds.includes(itensMarcados[0])&&itensMarcados.length===todosIds.length ? [] : todosIds);
    }
    function fecharSelecionados(){
      const idsParaFechar = itensMarcados.length>0 ? itensMarcados : todosIds;
      if(idsParaFechar.length===0) return;
      limparContaPagaFirebase(idsParaFechar);
      setItensMarcados([]);
      setSelecionado(null);
    }

    const totalSelecionado = itensMarcados.length>0
      ? totalDe(lista.filter(c=>itensMarcados.includes(c.id)))
      : total;

    return(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <button onClick={()=>{setSelecionado(null);setItensMarcados([]);}} style={{
            background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer",padding:0}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:18,color:C.yellow}}>
              {selecionado.tipo==="mesa"?"🪑 ":"👤 "}{selecionado.valor}
            </div>
            <div style={{fontSize:11,color:C.muted}}>{lista.length} itens consumidos</div>
          </div>
        </div>

        <Crd>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <Lbl>Itens consumidos</Lbl>
            <button onClick={marcarTodos} style={{background:"none",border:"none",
              color:C.yellow,fontSize:11,fontWeight:700,cursor:"pointer"}}>
              {itensMarcados.length===todosIds.length&&todosIds.length>0?"Desmarcar todos":"Marcar todos"}
            </button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {lista.map(c=>{
              const marcado = itensMarcados.includes(c.id);
              return(
                <button key={c.id} onClick={()=>toggleItem(c.id)} style={{
                  display:"flex",alignItems:"center",gap:10,padding:"9px 11px",
                  borderRadius:9,border:`1.5px solid ${marcado?C.yellow:C.border}`,
                  background:marcado?C.yellowDim:"transparent",cursor:"pointer",textAlign:"left"}}>
                  <span style={{fontSize:16}}>{marcado?"☑️":"⬜"}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:C.text}}>
                      {c.nome}{c.qtdBebida>1?` x${c.qtdBebida}`:""}
                    </div>
                    <div style={{fontSize:10,color:C.muted}}>
                      {selecionado.tipo==="mesa" && c.cliente!=="—" ? c.cliente+" · " : ""}{c.hora}
                    </div>
                  </div>
                  <div style={{fontWeight:800,color:C.yellow,fontSize:14}}>
                    R$ {(c.preco||0).toFixed(2)}
                  </div>
                </button>
              );
            })}
          </div>
        </Crd>

        <Crd style={{borderColor:C.yellow}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:C.muted}}>
                {itensMarcados.length>0?`${itensMarcados.length} itens selecionados`:"Total da conta"}
              </div>
              <div style={{fontSize:26,fontWeight:900,color:C.yellow}}>
                R$ {totalSelecionado.toFixed(2)}
              </div>
            </div>
            <button onClick={fecharSelecionados} style={{
              background:C.green,border:"none",borderRadius:10,padding:"12px 20px",
              color:"#fff",fontWeight:900,fontSize:14,cursor:"pointer"}}>
              ✓ Fechar conta
            </button>
          </div>
        </Crd>
      </div>
    );
  }

  // Tela de edição de preços
  if(modo==="precos"){
    return <PrecosEditor onVoltar={()=>setModo("mesas")}/>;
  }

  // Tela de listagem (mesas ou pessoas)
  const grupos = modo==="mesas" ? porMesa : porPessoa;
  const chaves = Object.keys(grupos).sort();
  const totalGeral = consumo.reduce((s,c)=>s+(c.preco||0),0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <Crd>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:C.muted}}>Total em aberto</div>
            <div style={{fontSize:24,fontWeight:900,color:C.yellow}}>R$ {totalGeral.toFixed(2)}</div>
          </div>
          <button onClick={()=>setModo("precos")} style={{
            background:C.card2,border:`1px solid ${C.border}`,borderRadius:9,
            padding:"8px 12px",color:C.yellow,fontWeight:700,fontSize:12,cursor:"pointer"}}>
            ⚙️ Editar preços
          </button>
        </div>
      </Crd>

      <div style={{display:"flex",gap:6}}>
        <Chip ativo={modo==="mesas"}   cor={C.yellow} onClick={()=>setModo("mesas")}>🪑 Por Mesa</Chip>
        <Chip ativo={modo==="pessoas"} cor={C.yellow} onClick={()=>setModo("pessoas")}>👤 Por Pessoa</Chip>
      </div>

      {chaves.length===0 &&
        <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"30px 0"}}>
          {modo==="mesas"
            ? "Nenhuma conta em aberto."
            : "Nenhum consumo identificado por nome ainda. Identifique o cliente no pedido para conseguir fechar a conta dele separadamente."}
        </div>}

      {chaves.map(chave=>{
        const lista = grupos[chave];
        const total = totalDe(lista);
        return(
          <button key={chave} onClick={()=>setSelecionado({tipo:modo==="mesas"?"mesa":"pessoa", valor:chave})}
            style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
              padding:"13px",cursor:"pointer",textAlign:"left",width:"100%",color:C.text}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.yellow}
            onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:800,color:C.yellow,fontSize:15}}>
                  {modo==="mesas"?"🪑 ":"👤 "}{chave}
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{lista.length} itens</div>
              </div>
              <div style={{fontWeight:900,color:C.text,fontSize:18}}>
                R$ {total.toFixed(2)}
              </div>
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── EDITOR DE PREÇOS ──────────────────────────────────────────────
function PrecosEditor({onVoltar}){
  const [busca,setBusca] = useState("");
  const [precosLocais,setPrecosLocais] = useState({...PRECOS_CUSTOM});
  const [alterado,setAlterado] = useState(false);

  const itensFiltrados = CARDAPIO.filter(i=>
    i.cat!=="🥤 Bebidas" || true // bebidas também editáveis
  ).filter(i=>
    busca.trim()==="" || i.nome.toLowerCase().includes(busca.toLowerCase()));

  function valorAtual(id){
    return precosLocais[id] !== undefined ? precosLocais[id] : precoBase(id);
  }
  function setPreco(id, valor){
    const num = parseFloat(valor.replace(",","."))||0;
    setPrecosLocais(p=>({...p, [id]:num}));
    setAlterado(true);
  }
  function salvar(){
    salvarPrecosFirebase(precosLocais);
    PRECOS_CUSTOM = {...precosLocais};
    setAlterado(false);
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onVoltar} style={{background:"none",border:"none",
          color:C.muted,fontSize:20,cursor:"pointer",padding:0}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:18,color:C.yellow}}>⚙️ Editar Preços</div>
          <div style={{fontSize:11,color:C.muted}}>Os valores aqui sobrescrevem o cardápio padrão</div>
        </div>
        {alterado &&
          <button onClick={salvar} style={{background:C.yellow,border:"none",borderRadius:8,
            padding:"7px 14px",cursor:"pointer",color:"#000",fontWeight:900,fontSize:13}}>
            ✓ Salvar
          </button>}
      </div>

      <Inp placeholder="🔍 Buscar item…" value={busca} onChange={e=>setBusca(e.target.value)}/>

      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {itensFiltrados.map(item=>(
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,
            background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 12px"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>{item.nome}</div>
              <div style={{fontSize:10,color:C.muted}}>{item.sub}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontSize:13,color:C.muted}}>R$</span>
              <input type="text" value={valorAtual(item.id).toFixed(2)}
                onChange={e=>setPreco(item.id, e.target.value)}
                style={{width:70,background:C.bg,border:`1px solid ${C.border}`,
                  borderRadius:7,padding:"6px 8px",color:C.yellow,fontWeight:800,
                  fontSize:14,textAlign:"right",outline:"none"}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// COZINHA
// ════════════════════════════════════════════════════════════════════
function Cozinha({setTela,fila,light,toggleTema}){
  const [preparando,setPreparando] = useState([]);

  const mesaCor={};
  [...new Set(fila.map(p=>p.mesa))].forEach((m,i)=>{mesaCor[m]=CORES_MESA[i%CORES_MESA.length];});

  function toggle(pid,iid){
    const k=`${pid}-${iid}`;
    setPreparando(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);
  }
  function finalizar(pid,iid){
    setPreparando(p=>p.filter(x=>x!==`${pid}-${iid}`));
    const pedido = fila.find(p=>p.id===pid);
    if(pedido) finalizarItemFirebase(pid, iid, pedido.itens, pedido);
  }
  // Entregar bebida — não passa por "preparo", sem notificação, registra consumo direto
  function entregarBebida(pid,iid){
    const pedido = fila.find(p=>p.id===pid);
    if(pedido) finalizarItemFirebase(pid, iid, pedido.itens, pedido, true);
  }

  // Separar itens da fila: bebidas (painel próprio) vs comida (fluxo normal)
  const filaBebidas = [];
  const filaComida = [];
  fila.forEach(ped=>{
    const bebidas = ped.itens.filter(it=>it.eBebida);
    const comidas = ped.itens.filter(it=>!it.eBebida);
    if(bebidas.length>0) filaBebidas.push({ped, itens:bebidas});
    if(comidas.length>0) filaComida.push({ped, itens:comidas});
  });

  const emPreparo=[];
  filaComida.forEach(({ped,itens})=>itens.forEach(it=>{
    if(preparando.includes(`${ped.id}-${it.id}`)) emPreparo.push({ped,it});
  }));

  // Grid adaptativo: até 12 cards cabem na tela sem rolagem (monitor grande na cozinha)
  const n = emPreparo.length;
  let colsNum, escala;
  if      (n<=1) { colsNum=1; escala=1;    }
  else if (n<=2) { colsNum=2; escala=1;    }
  else if (n<=4) { colsNum=2; escala=0.9;  }
  else if (n<=6) { colsNum=3; escala=0.82; }
  else if (n<=9) { colsNum=3; escala=0.68; }
  else           { colsNum=4; escala=0.58; } // até 12
  const cols = `repeat(${colsNum}, 1fr)`;

  const totalBebidasPendentes = filaBebidas.reduce((a,f)=>a+f.itens.length,0);

  return(
    <div style={{height:"100vh",background:C.bg,color:C.text,
      display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,
        padding:"9px 18px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={()=>setTela("sel")} style={{background:"none",border:"none",
          color:C.muted,cursor:"pointer",fontSize:18,padding:0}}>←</button>
        <span style={{fontSize:20}}>🏎️</span>
        <span style={{fontWeight:900,fontSize:17,color:C.yellow}}>GARAGEM 77</span>
        <span style={{color:C.muted,fontSize:13,marginLeft:2}}>— Cozinha</span>
        <div style={{flex:1}}/>
        <button onClick={toggleTema} style={{background:C.card2,border:`1px solid ${C.kBorder||C.border}`,
          borderRadius:20,padding:"4px 10px",cursor:"pointer",
          fontSize:12,fontWeight:700,color:C.yellow,marginRight:4}}>
          {light?"🌙":"☀️"}
        </button>
        <KTag c="#4ECDC4">{totalBebidasPendentes} bebidas</KTag>
        <KTag c="#FFB800">{filaComida.reduce((a,f)=>a+f.itens.length,0)} na fila</KTag>
        <KTag c="#22C55E">{emPreparo.length} preparando</KTag>
      </div>
      {/* Layout */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* FILA LATERAL */}
        <div style={{width:270,flexShrink:0,background:C.card,
          borderRight:`1px solid #272727`,overflowY:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.border}`,
            fontSize:10,textTransform:"uppercase",letterSpacing:1,color:C.muted}}>
            Fila de pedidos (lanches/porções)
          </div>
          {filaComida.length===0 &&
            <div style={{padding:20,color:C.muted,textAlign:"center",fontSize:13,marginTop:16}}>
              Nenhum pedido na fila
            </div>}
          {filaComida.map(({ped,itens})=>(
            <div key={ped.id} style={{borderBottom:`1px solid ${C.border}`,
              borderLeft:`4px solid ${mesaCor[ped.mesa]||C.yellow}`}}>
              {/* Cabeçalho pedido */}
              <div style={{padding:"7px 10px 4px",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <div style={{background:C.yellow,color:"#000",borderRadius:6,
                  padding:"1px 8px",fontSize:13,fontWeight:900}}>
                  #{ped.id}
                </div>
                <div style={{background:(mesaCor[ped.mesa]||C.yellow)+"33",
                  color:mesaCor[ped.mesa]||C.yellow,
                  borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:700}}>
                  {ped.mesa}
                </div>
                {ped.cliente!=="—"&&
                  <div style={{fontSize:10,color:C.muted,flex:1,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {ped.cliente}
                  </div>}
                <div style={{fontSize:10,color:C.muted}}>{ped.hora}</div>
              </div>
              {/* Itens (apenas comida) */}
              {itens.map(it=>{
                const k=`${ped.id}-${it.id}`;
                const on=preparando.includes(k);
                return(
                  <div key={it.id} style={{padding:"5px 10px 6px",
                    display:"flex",alignItems:"center",gap:7,
                    background:on?C.yellow+"11":"transparent"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:on?800:400,
                        color:on?C.yellow:C.text,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {it.item.nome}
                        {it.tamanho&&<span style={{color:C.muted,fontWeight:400,fontSize:10}}> {it.tamanho}</span>}
                      </div>
                      {it.pao&&<div style={{fontSize:10,color:"#A78BFA"}}>🍞 {it.pao}</div>}
                      {it.removidos?.length>0&&
                        <div style={{fontSize:10,color:C.red}}>s/ {it.removidos.join(", ")}</div>}
                      {it.ponto&&<div style={{fontSize:10,color:"#888"}}>🔥 {it.ponto}</div>}
                    </div>
                    <button onClick={()=>toggle(ped.id,it.id)} style={{
                      background:on?C.yellow:"#2A2A2A",border:"none",borderRadius:6,
                      color:on?"#000":C.muted,padding:"4px 8px",
                      cursor:"pointer",fontSize:10,fontWeight:800,whiteSpace:"nowrap"}}>
                      {on?"▶ Fazendo":"▶ Iniciar"}
                    </button>
                  </div>
                );
              })}
            </div>
          ))}
        </div>

        {/* COLUNA CENTRAL: TELA PRINCIPAL (preparo de comida) */}
        <div style={{flex:1,overflow:"hidden",padding:Math.round(14*Math.max(escala,0.7))}}>
          {emPreparo.length===0 ?
            <div style={{height:"100%",display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",gap:12,color:C.muted}}>
              <div style={{fontSize:52}}>🍳</div>
              <div style={{fontSize:16}}>Clique em "Iniciar" na fila ao lado</div>
              <div style={{fontSize:13}}>Os ingredientes aparecem aqui</div>
            </div>
          :
            <div style={{display:"grid",gridTemplateColumns:cols,gridAutoRows:"1fr",
              gap:Math.round(12*escala),height:"100%"}}>
              {emPreparo.map(({ped,it})=>(
                <CardPreparo key={`${ped.id}-${it.id}`} ped={ped} it={it}
                  cor={mesaCor[ped.mesa]||C.yellow} escala={escala}
                  onFinalizar={()=>finalizar(ped.id,it.id)}/>
              ))}
            </div>}
        </div>

        {/* COLUNA DIREITA: SETOR DE BEBIDAS */}
        <div style={{width:280,flexShrink:0,background:C.card,
          borderLeft:`1px solid ${C.border}`,overflowY:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.border}`,
            display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:16}}>🥤</span>
            <span style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,
              color:"#4ECDC4",fontWeight:800}}>Setor de Bebidas</span>
          </div>
          {filaBebidas.length===0 &&
            <div style={{padding:20,color:C.muted,textAlign:"center",fontSize:13,marginTop:16}}>
              Nenhuma bebida pendente
            </div>}
          {filaBebidas.map(({ped,itens})=>(
            <div key={ped.id} style={{borderBottom:`1px solid ${C.border}`,
              borderLeft:`4px solid ${mesaCor[ped.mesa]||"#4ECDC4"}`}}>
              <div style={{padding:"8px 10px 4px",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <div style={{background:"#4ECDC4",color:"#000",borderRadius:6,
                  padding:"1px 8px",fontSize:12,fontWeight:900}}>
                  #{ped.id}
                </div>
                <div style={{background:(mesaCor[ped.mesa]||"#4ECDC4")+"33",
                  color:mesaCor[ped.mesa]||"#4ECDC4",
                  borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:700}}>
                  {ped.mesa}
                </div>
                {ped.cliente!=="—"&&
                  <div style={{fontSize:10,color:C.muted,flex:1,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {ped.cliente}
                  </div>}
              </div>
              {itens.map(it=>(
                <div key={it.id} style={{padding:"7px 10px 9px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text,
                        display:"flex",alignItems:"center",gap:6}}>
                        {it.item.nome}
                        {it.qtdBebida>1 &&
                          <span style={{background:"#4ECDC422",color:"#4ECDC4",
                            borderRadius:6,padding:"0 6px",fontSize:12,fontWeight:900}}>
                            x{it.qtdBebida}
                          </span>}
                      </div>
                      {it.copos?.filter(c=>c.qtd>0).map(c=>(
                        <div key={c.tipo} style={{fontSize:11,color:"#4ECDC4",marginTop:2}}>
                          {c.qtd}× {c.tipo}
                        </div>
                      ))}
                    </div>
                  </div>
                  <button onClick={()=>entregarBebida(ped.id,it.id)} style={{
                    width:"100%",marginTop:7,background:"#4ECDC4",border:"none",
                    borderRadius:7,padding:"7px",color:"#003330",fontWeight:900,
                    fontSize:12,cursor:"pointer"}}>
                    ✓ Entregar bebida
                  </button>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CardPreparo({ped,it,cor,onFinalizar,escala=1}){
  // Tamanhos base × escala (arredondados)
  const fs = (base)=>Math.max(9, Math.round(base*escala));
  const pd = (base)=>Math.max(3, Math.round(base*escala));
  const gp = (base)=>Math.max(2, Math.round(base*escala));

  return(
    <div style={{background:C.card,borderRadius:fs(16),border:`2px solid ${cor}`,
      padding:pd(14),display:"flex",flexDirection:"column",gap:gp(8),
      overflow:"hidden",minHeight:0}}>

      {/* Mesa em destaque (sem número do pedido) */}
      <div style={{display:"flex",alignItems:"center",gap:gp(8)}}>
        <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
          <div style={{background:cor+"33",color:cor,borderRadius:6,
            padding:`3px ${pd(10)}px`,fontSize:fs(14),fontWeight:800,display:"inline-block"}}>
            {ped.mesa}
          </div>
          {ped.cliente!=="—"&&escala>0.7&&
            <div style={{fontSize:fs(11),color:C.muted,marginTop:2,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ped.cliente}</div>}
        </div>
        {escala>0.65 && <div style={{fontSize:fs(11),color:C.muted,flexShrink:0}}>{ped.hora}</div>}
      </div>

      {/* Nome do lanche */}
      <div style={{fontWeight:900,fontSize:fs(18),color:C.yellow,lineHeight:1.15,
        borderBottom:`1px solid ${C.border}`,paddingBottom:pd(8),flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:gp(8),flexWrap:"wrap"}}>
          <span>{it.item.nome}</span>
          {it.eBebida && it.qtdBebida>1 &&
            <span style={{background:"#4ECDC422",color:"#4ECDC4",borderRadius:8,
              padding:`1px ${pd(8)}px`,fontSize:fs(15),fontWeight:900}}>x{it.qtdBebida}</span>}
        </div>
        {it.tamanho&&<span style={{color:C.muted,fontWeight:400,fontSize:fs(12)}}> — {it.tamanho}</span>}
        {it.item.sub&&escala>0.7&&
          <div style={{color:C.muted,fontWeight:400,fontSize:fs(11),marginTop:2}}>{it.item.sub}</div>}
      </div>

      {/* Corpo com scroll interno só se necessário (telas pequenas) */}
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:gp(6),
        overflowY:"auto",minHeight:0}}>

        {/* Tags de preparo */}
        {(it.pao||it.hamburguer||it.ponto)&&
          <div style={{display:"flex",gap:gp(5),flexWrap:"wrap"}}>
            {it.pao        &&<PTag c="#A78BFA" fs={fs(10)}>🍞 {it.pao}</PTag>}
            {it.hamburguer &&<PTag c="#F59E0B" fs={fs(10)}>🥩 {escala>0.7?it.hamburguer:it.hamburguer.split(" ")[0]}</PTag>}
            {it.ponto      &&<PTag c="#FB923C" fs={fs(10)}>🔥 {it.ponto}</PTag>}
          </div>}

        {/* Copos para bebidas */}
        {it.eBebida && it.copos?.some(c=>c.qtd>0) &&
          <div style={{background:"#4ECDC411",border:"1px solid #4ECDC444",
            borderRadius:9,padding:pd(8),display:"flex",flexDirection:"column",gap:gp(4)}}>
            {escala>0.7&&<div style={{fontSize:fs(9),textTransform:"uppercase",letterSpacing:1,color:"#4ECDC4"}}>
              🧊 Copos
            </div>}
            {it.copos.filter(c=>c.qtd>0).map(c=>(
              <div key={c.tipo} style={{display:"flex",alignItems:"center",gap:gp(6)}}>
                <span style={{fontSize:fs(16),fontWeight:900,color:"#4ECDC4",minWidth:22}}>{c.qtd}×</span>
                <span style={{fontSize:fs(13),color:C.text,fontWeight:600}}>{c.tipo}</span>
              </div>
            ))}
          </div>}

        {/* Ingredientes */}
        {it.ing.length>0 ?
          <div style={{display:"flex",flexDirection:"column",gap:gp(4)}}>
            {it.item.ing.map(ing=>{
              const rem=it.removidos?.includes(ing);
              return(
                <div key={ing} style={{display:"flex",alignItems:"center",gap:gp(7),
                  padding:`${pd(5)}px ${pd(9)}px`,borderRadius:7,
                  background:rem?C.red+"14":C.green+"0E",
                  border:`1px solid ${rem?C.red+"44":C.green+"28"}`}}>
                  <span style={{fontSize:fs(13)}}>{rem?"✕":"✓"}</span>
                  <span style={{fontSize:fs(13),fontWeight:600,flex:1,
                    color:rem?C.red:C.text,textDecoration:rem?"line-through":"none",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {ing}
                  </span>
                  {rem&&escala>0.65&&<span style={{fontSize:fs(9),color:C.red,fontWeight:900,flexShrink:0}}>RETIRAR</span>}
                </div>
              );
            })}
          </div>
        :
          <div style={{color:C.muted,fontSize:fs(12),fontStyle:"italic"}}>Sem ingredientes específicos</div>}

        {/* Observações */}
        {it.obs&&
          <div style={{background:"#FBBF2418",border:"1px solid #FBBF2444",
            borderRadius:8,padding:pd(7),color:"#FDE68A",fontSize:fs(11),fontWeight:600}}>
            📝 {it.obs}
          </div>}

        {/* Alerta remoções */}
        {it.removidos?.length>0&&
          <div style={{background:C.red+"14",border:`1px solid ${C.red}44`,
            borderRadius:8,padding:pd(7),color:C.red,fontSize:fs(11),fontWeight:800}}>
            ⚠️ SEM: {it.removidos.join(", ")}
          </div>}
      </div>

      <button onClick={onFinalizar} style={{
        background:C.green,border:"none",borderRadius:9,padding:pd(11),
        color:"#fff",fontWeight:900,fontSize:fs(13),cursor:"pointer",flexShrink:0}}>
        ✓ Pronto!
      </button>
    </div>
  );
}

// ── AUTOCOMPLETE CLIENTE
function ClienteAutocomplete({value,clientes,onChange,onSelect}){
  const [aberto,setAberto] = useState(false);
  const sugestoes = value.length>0
    ? clientes.filter(c=>c.nome.toLowerCase().includes(value.toLowerCase())).slice(0,6)
    : [];
  return(
    <div style={{position:"relative",marginTop:8}}>
      <input value={value}
        onChange={e=>{onChange(e.target.value);setAberto(true);}}
        onFocus={()=>setAberto(true)}
        onBlur={()=>setTimeout(()=>setAberto(false),150)}
        placeholder="Nome do cliente…"
        style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,
          borderRadius:8,padding:"8px 11px",color:C.text,fontSize:14,
          boxSizing:"border-box",outline:"none"}}/>
      {aberto && sugestoes.length>0 &&
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:99,
          background:C.card,border:`1px solid ${C.yellow}`,borderRadius:10,
          overflow:"hidden",marginTop:3,boxShadow:"0 8px 24px #0006"}}>
          {sugestoes.map(c=>(
            <button key={c.id} onMouseDown={()=>{onSelect(c);setAberto(false);}} style={{
              width:"100%",padding:"10px 13px",background:"none",border:"none",
              borderBottom:`1px solid ${C.border}`,cursor:"pointer",textAlign:"left",
              display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:C.yellow}}>{c.nome}</div>
                {c.cel&&<div style={{fontSize:11,color:C.muted}}>{c.cel}</div>}
              </div>
              {(c.historico||[]).length>0 &&
                <span style={{fontSize:10,color:C.muted,background:C.card2,
                  borderRadius:10,padding:"1px 6px"}}>
                  {(c.historico||[]).length} pedidos
                </span>}
            </button>
          ))}
        </div>}
    </div>
  );
}

// ── EDITOR DE BEBIDAS (unidades + copos/acompanhamentos)
function BebidaEditor({ativo,setAtivo}){
  function setQtdBebida(n){
    setAtivo(a=>({...a, qtdBebida:Math.max(1,n)}));
  }
  function setCopo(tipo,n){
    setAtivo(a=>({
      ...a,
      copos: a.copos.map(c=>c.tipo===tipo ? {...c,qtd:Math.max(0,n)} : c)
    }));
  }
  const totalCopos = ativo.copos.reduce((s,c)=>s+c.qtd,0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Quantidade de bebidas */}
      <Sec title="Quantidade de bebidas">
        <div style={{display:"flex",alignItems:"center",gap:0,marginTop:6}}>
          <BtnQtd onClick={()=>setQtdBebida(ativo.qtdBebida-1)} disabled={ativo.qtdBebida<=1}>−</BtnQtd>
          <div style={{minWidth:52,textAlign:"center",fontSize:22,fontWeight:900,color:C.yellow}}>
            {ativo.qtdBebida}
          </div>
          <BtnQtd onClick={()=>setQtdBebida(ativo.qtdBebida+1)}>+</BtnQtd>
        </div>
      </Sec>

      {/* Copos / acompanhamentos */}
      <Sec title={`Copos e acompanhamentos${totalCopos>0?" ("+totalCopos+" copos)":""}`}>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:6}}>
          {ativo.copos.map(c=>(
            <div key={c.tipo} style={{display:"flex",alignItems:"center",gap:10,
              background:c.qtd>0?C.yellowDim:C.bg,
              border:`1px solid ${c.qtd>0?C.yellow:C.border}`,
              borderRadius:10,padding:"8px 12px"}}>
              <div style={{flex:1}}>
                <span style={{fontSize:14,fontWeight:c.qtd>0?700:400,
                  color:c.qtd>0?C.yellow:C.text}}>
                  {c.tipo==="Puro"?"🥤":"🧊"} {c.tipo}
                </span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:0}}>
                <BtnQtd onClick={()=>setCopo(c.tipo,c.qtd-1)} disabled={c.qtd<=0}>−</BtnQtd>
                <div style={{minWidth:36,textAlign:"center",fontSize:18,fontWeight:800,
                  color:c.qtd>0?C.yellow:C.muted}}>{c.qtd}</div>
                <BtnQtd onClick={()=>setCopo(c.tipo,c.qtd+1)}>+</BtnQtd>
              </div>
            </div>
          ))}
        </div>
        <div style={{marginTop:8,fontSize:11,color:C.muted,fontStyle:"italic"}}>
          Cada tipo de copo é independente da quantidade de bebidas
        </div>
      </Sec>
    </div>
  );
}

function BtnQtd({children,onClick,disabled}){
  return(
    <button onClick={onClick} disabled={disabled} style={{
      width:36,height:36,borderRadius:8,border:`1px solid ${C.border}`,
      background:disabled?C.card2:C.card,
      color:disabled?C.muted:C.yellow,
      cursor:disabled?"not-allowed":"pointer",
      fontSize:20,fontWeight:800,
      display:"flex",alignItems:"center",justifyContent:"center",
      flexShrink:0}}>
      {children}
    </button>
  );
}

// ── EDITOR DE INGREDIENTES (remover + adicionar com busca)
function IngredientesEditor({ativo,setAtivo}){
  const [abrirAdd,setAbrirAdd] = useState(false);
  const [busca,setBusca]       = useState("");

  // ingredientes do lanche original que ainda estão ativos
  const originais = ativo.item.ing;
  // ingredientes adicionados pelo garçom (não estavam no original)
  const adicionados = ativo.ing.filter(i=>!originais.includes(i));

  const disponiveis = TODOS_INGREDIENTES.filter(i=>
    !ativo.ing.includes(i) &&
    i.toLowerCase().includes(busca.toLowerCase())
  );

  function toggleOriginal(ing){
    const on=ativo.ing.includes(ing);
    setAtivo(a=>({...a,ing:on?a.ing.filter(x=>x!==ing):[...a.ing,ing]}));
  }
  function addIngrediente(ing){
    setAtivo(a=>({...a,ing:[...a.ing,ing]}));
    setBusca("");
  }
  function removerAdicionado(ing){
    setAtivo(a=>({...a,ing:a.ing.filter(x=>x!==ing)}));
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* Ingredientes originais */}
      {originais.length>0 &&
        <div>
          <Lbl>Ingredientes — toque para remover</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:7}}>
            {originais.map(ing=>{
              const on=ativo.ing.includes(ing);
              return(
                <button key={ing} onClick={()=>toggleOriginal(ing)} style={{
                  padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,
                  background:on?C.green+"20":C.red+"18",
                  border:`1.5px solid ${on?C.green:C.red}`,
                  color:on?C.green:C.red,
                  textDecoration:on?"none":"line-through"}}>
                  {on?"✓":"✕"} {ing}
                </button>
              );
            })}
          </div>
        </div>}

      {/* Ingredientes adicionados */}
      {adicionados.length>0 &&
        <div>
          <Lbl>Adicionados</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:7}}>
            {adicionados.map(ing=>(
              <button key={ing} onClick={()=>removerAdicionado(ing)} style={{
                padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,
                background:"#A78BFA22",border:"1.5px solid #A78BFA",color:"#A78BFA"}}>
                + {ing} ✕
              </button>
            ))}
          </div>
        </div>}

      {/* Botão abrir buscador */}
      <button onClick={()=>setAbrirAdd(!abrirAdd)} style={{
        padding:"9px 14px",borderRadius:10,border:`1.5px dashed ${C.yellow}`,
        background:abrirAdd?C.yellowDim:"transparent",
        color:C.yellow,cursor:"pointer",fontWeight:700,fontSize:13,
        display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
        {abrirAdd?"▲ Fechar":"＋ Adicionar ingrediente"}
      </button>

      {/* Painel de busca */}
      {abrirAdd &&
        <div style={{background:C.bg,border:`1px solid ${C.border}`,
          borderRadius:12,padding:10,display:"flex",flexDirection:"column",gap:8}}>
          <input value={busca} onChange={e=>setBusca(e.target.value)}
            placeholder="🔍 Buscar ingrediente…"
            autoFocus
            style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,
              borderRadius:8,padding:"9px 12px",color:C.text,fontSize:14,
              boxSizing:"border-box",outline:"none"}}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:160,overflowY:"auto"}}>
            {disponiveis.length===0 &&
              <div style={{color:C.muted,fontSize:13,padding:6}}>
                {busca?"Nenhum ingrediente encontrado":"Digite para buscar…"}
              </div>}
            {disponiveis.map(ing=>(
              <button key={ing} onClick={()=>addIngrediente(ing)} style={{
                padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",
                background:C.yellow,color:"#000",fontSize:13,fontWeight:700}}>
                + {ing}
              </button>
            ))}
          </div>
        </div>}
    </div>
  );
}

// ── MICRO COMPONENTES
function Lbl({children}){return <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>{children}</div>;}
function Sec({title,children}){return <div><Lbl>{title}</Lbl><div style={{marginTop:7}}>{children}</div></div>;}
function Crd({children,style={}}){return <div style={{background:C.card,borderRadius:12,padding:13,border:`1px solid ${C.border}`,...style}}>{children}</div>;}
function Inp({mt=0,...props}){return <input {...props} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontSize:13,boxSizing:"border-box",marginTop:mt,outline:"none"}}/>;}
function Chip({children,ativo,cor,onClick}){return <button onClick={onClick} style={{padding:"5px 11px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:ativo?cor:C.card2,color:ativo?"#000":C.muted}}>{children}</button>;}
function Pill({children,c}){return <span style={{background:c+"22",color:c,borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:600}}>{children}</span>;}
function KTag({children,c}){return <span style={{background:c+"22",color:c,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{children}</span>;}
function PTag({children,c,fs}){return <span style={{background:c+"22",color:c,borderRadius:6,padding:"3px 8px",fontSize:fs||11,fontWeight:700,whiteSpace:"nowrap"}}>{children}</span>;}
