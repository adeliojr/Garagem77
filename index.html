const ADICIONAL_ARTESANAL = {
  11:7, 12:7, 13:7, 14:7, 15:7, 16:7, 17:8, 18:7, 19:7, 20:7, 21:7, 22:0,
};

function precoBase(itemId){
  return PRECOS_PADRAO[itemId] || 0;
}

// Calcula o preço de um item configurado (considera tamanho, artesanal, qtd bebida)
function calcularPrecoItem(item, opcoes){
  opcoes = opcoes || {};
  let preco = precoAtual(item.id);

  // Porção com tamanho específico
  if(opcoes.tamanho && PRECOS_PORCAO_TAMANHO[item.id]){
    const customTam = PRECOS_CUSTOM["tam_"+item.id+"_"+opcoes.tamanho];
    preco = customTam !== undefined ? customTam : (PRECOS_PORCAO_TAMANHO[item.id][opcoes.tamanho] || preco);
  }

  // Hambúrguer artesanal de costela = adicional
  if(opcoes.hamburguer && opcoes.hamburguer.includes("Artesanal")){
    const customAdc = PRECOS_CUSTOM["adc_"+item.id];
    preco += (customAdc !== undefined ? customAdc : (ADICIONAL_ARTESANAL[item.id] || 0));
  }

  // Bebida: multiplica pela quantidade
  if(opcoes.eBebida && opcoes.qtdBebida){
    preco = preco * opcoes.qtdBebida;
  }

  return preco;
}

let syncFila = null;

// Contador sequencial de pedidos (reinicia a cada dia)
function proximoNumeroPedido(cb){
  var hoje = new Date().toISOString().slice(0,10).replace(/-/g,"");
  var ref = db.ref("contadores/"+hoje);
  ref.transaction(function(val){ return (val||0)+1; }, function(err,ok,snap){
    if(ok){
      cb(snap.val());
    } else {
      // Transação falhou (raro, ex: rede instável) — usa push() do Firebase,
      // que gera uma chave verdadeiramente única e nunca colide entre pedidos
      var pushRef = db.ref("pedidos").push();
      // Extrai algo legível do ID gerado (últimos 6 caracteres) para exibir
      var idUnico = pushRef.key ? pushRef.key.slice(-6) : ("ERR"+Date.now());
      console.error("Falha na transação do contador de pedidos — usando ID alternativo:", idUnico);
      cb(idUnico);
    }
  });
}

      return {
        id: it.id,
        itemId: it.item.id,
        nome: it.item.nome,
        sub: it.item.sub || "",
        cat: it.item.cat,
        ing: it.ing || [],
        ingOriginal: it.item.ing || [],
        removidos: it.removidos || [],
        obs: it.obs || "",
        pao: it.pao || null,
        cortado: it.cortado || false,
        hamburguer: it.hamburguer || null,
        ponto: it.ponto || null,
        tamanho: it.tamanho || null,
        eBebida: it.eBebida || false,
        qtdBebida: it.qtdBebida || null,
        copos: it.copos || null,
        preco: it.preco || 0,
      };
    })
  };
  db.ref("pedidos/"+pedido.id).set(pedidoLimpo).catch(function(err){
    console.error("Erro ao enviar pedido:", err);
    reportarErro("Não foi possível enviar o pedido. Verifique a internet e tente novamente.");
  });
}

function finalizarItemFirebase(pedidoId, itemId, itensTotais, pedidoInfo, semNotificar){
  // Notificar o garçom que o lanche está pronto (bebidas não notificam, são entregues direto)
  var itemPronto = itensTotais.find(function(i){ return i.id===itemId; });
  if(itemPronto && pedidoInfo){
    if(!semNotificar){
      var prontoId = pedidoId+"_"+itemId;
      db.ref("prontos/"+prontoId).set({
        id: prontoId,
        pedidoId: pedidoId,
        mesa: pedidoInfo.mesa,
        cliente: pedidoInfo.cliente,
        nome: itemPronto.nome,
        hora: new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
        ts: Date.now()
      });
    }
    // Registrar no CONSUMO da mesa (para fechar conta depois) — não se perde quando a fila esvazia
    registrarConsumo(pedidoInfo, itemPronto);
  }
  // Remover da fila de preparo
  var restantes = itensTotais.filter(function(i){ return i.id!==itemId; });
  if(restantes.length===0){
    db.ref("pedidos/"+pedidoId).remove();
  } else {
    db.ref("pedidos/"+pedidoId+"/itens").set(restantes);
  }
}

// Registra o consumo permanente da mesa/cliente (para fechamento de conta)
function registrarConsumo(pedidoInfo, item){
  var mesaSlug = pedidoInfo.mesa.replace(/[^a-zA-Z0-9]/g,"_");
  var consumoId = "m_"+mesaSlug+"_"+item.id;
  db.ref("consumo/"+consumoId).set({
    id: consumoId,
    pedidoId: pedidoInfo.id,
    mesa: pedidoInfo.mesa,
    cliente: pedidoInfo.cliente || "—",
    nome: item.nome,
    preco: item.preco || 0,
    qtdBebida: item.qtdBebida || null,
    eBebida: item.eBebida || false,
    hora: new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
    data: new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"}),
    ts: Date.now(),
    pago: false
  });
}
// Fecha a conta: move os itens para o histórico permanente de vendas
// e só então remove do consumo ativo. Os dados financeiros nunca são perdidos.
function fecharContaFirebase(itensFechados){
  // Multi-path update: escreve a venda E remove do consumo em UMA ÚNICA operação
  // atômica do Firebase — se a conexão cair, ou as duas coisas acontecem, ou nenhuma.
  // Isso evita o item ficar duplicado (em vendas e em consumo) ou desaparecer sem registro.
  var updates = {};
  itensFechados.forEach(function(item){
    var vendaId = item.id+"_v"+Date.now();
    updates["vendas/"+vendaId] = {
      id: vendaId,
      consumoIdOriginal: item.id,
      pedidoId: item.pedidoId,
      mesa: item.mesa,
      cliente: item.cliente || "—",
      nome: item.nome,
      preco: item.preco || 0,
      qtdBebida: item.qtdBebida || null,
      eBebida: item.eBebida || false,
      horaConsumo: item.hora,
      dataConsumo: item.data,
      fechadoEm: new Date().toLocaleString("pt-BR"),
      tsFechamento: Date.now()
    };
    updates["consumo/"+item.id] = null; // null em update() = remove aquele caminho
  });
  db.ref().update(updates).catch(function(err){
    console.error("Erro ao fechar conta:", err);
    reportarErro("Não foi possível fechar a conta. Verifique a internet e tente novamente.");
  });
}

function salvarUmClienteFirebase(cliente){
  var clienteLimpo = {
    id: cliente.id,
    nome: cliente.nome || "",
    cel: cliente.cel || "",
    email: cliente.email || "",
    cpf: cliente.cpf || "",
    nascimento: cliente.nascimento || "",
    obs: cliente.obs || "",
    historicoJSON: JSON.stringify(cliente.historico || [])
  };
  db.ref("clientes/c"+cliente.id).set(clienteLimpo).catch(function(err){
    console.error("Erro ao salvar cliente:", err);
    reportarErro("Não foi possível salvar os dados do cliente. Tente novamente.");
  });
}
function excluirClienteFirebase(id){
  db.ref("clientes/c"+id).remove().catch(function(err){
    console.error("Erro ao excluir cliente:", err);
    reportarErro("Não foi possível excluir o cliente. Tente novamente.");
  });
}

// Caixa aprova pedido → muda status para "aprovado" → cozinha passa a ver
function aprovarPedidoFirebase(pedidoId){
  db.ref("pedidos/"+pedidoId+"/status").set("aprovado").catch(function(err){
    console.error("Erro ao aprovar pedido:", err);
    reportarErro("Não foi possível aprovar o pedido. Verifique a internet.");
  });
}

function dispensarPronto(id){
  db.ref("prontos/"+id).remove();
}

// ── MÁSCARAS
function maskTel(v){
  const d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<=2)  return d.length?"("+d:"";
  if(d.length<=6)  return "("+d.slice(0,2)+") "+d.slice(2);
  if(d.length<=10) return "("+d.slice(0,2)+") "+d.slice(2,6)+"-"+d.slice(6);
  return "("+d.slice(0,2)+") "+d.slice(2,7)+"-"+d.slice(7);
}
function maskCPF(v){
  const d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<=3)  return d;
  if(d.length<=6)  return d.slice(0,3)+"."+d.slice(3);
  if(d.length<=9)  return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6);
  return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6,9)+"-"+d.slice(9);
}

function App(){
  const [tela,setTela]   = useState("sel");
  const [fila,setFila]   = useState([]);
  const [prontos,setProntos] = useState([]);
  const [light,setLight] = useState(false);
  const [fbStatus,setFbStatus] = useState("conectando");
  const [erroMsg,setErroMsg] = useState(null);

  // Conecta o callback global de erro a este estado, para qualquer função
  // do app (fora de componentes React) conseguir avisar o usuário na tela
  React.useEffect(function(){
    reportarErro = function(msg){
      setErroMsg(msg);
      setTimeout(()=>setErroMsg(null), 5000);
    };
  }, []);

  // Atualiza paleta global apenas quando o tema muda (evita loop de render)
  React.useMemo(function(){ C = mkC(light); }, [light]);
  const toggleTema = function(){ setLight(function(l){ return !l; }); };

  // Escutar fila de pedidos em tempo real
  React.useEffect(function(){
    var ref = db.ref("pedidos");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      if(!val){ setFila([]); setFbStatus("ok"); return; }
      var lista = Object.values(val).map(function(p){
        return Object.assign({}, p, {
          itens: (p.itens||[]).map(function(it){
            return Object.assign({}, it, {
              item: { nome: it.nome, sub: it.sub, cat: it.cat, ing: it.ingOriginal||[] }
            });
          })
        });
      }).sort(function(a,b){ return a.id-b.id; });
      setFila(lista);
      setFbStatus("ok");
    }, function(err){ console.error(err); setFbStatus("erro"); });
    return function(){ ref.off("value", handler); };
  }, []);

  // Escutar lanches prontos em tempo real (notificação para o garçom)
  React.useEffect(function(){
    var ref = db.ref("prontos");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      if(!val){ setProntos([]); return; }
      var lista = Object.values(val).sort(function(a,b){ return b.ts-a.ts; });
      setProntos(lista);
    });
    return function(){ ref.off("value", handler); };
  }, []);

  // Escutar clientes em tempo real (persistem entre versões do app)
  const [clientes,setClientes] = useState([]);
  React.useEffect(function(){
    var ref = db.ref("clientes");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      if(!val){ setClientes([]); return; }
      var lista = Object.values(val).map(function(c){
        var hist = [];
        try { hist = JSON.parse(c.historicoJSON || "[]"); } catch(e){ hist = []; }
        return Object.assign({}, c, { historico: hist });
      }).sort(function(a,b){ return (a.nome||"").localeCompare(b.nome||""); });
      setClientes(lista);
    });
    return function(){ ref.off("value", handler); };
  }, []);

  // Escutar consumo (itens entregues, para fechar contas) em tempo real
  const [consumo,setConsumo] = useState([]);
  React.useEffect(function(){
    var ref = db.ref("consumo");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      if(!val){ setConsumo([]); return; }
      var lista = Object.values(val).filter(function(c){ return !c.pago; })
        .sort(function(a,b){ return a.ts-b.ts; });
      setConsumo(lista);
    });
    return function(){ ref.off("value", handler); };
  }, []);

  // Escutar preços customizados em tempo real
  // precosVersion força re-render em toda a árvore quando o Firebase atualiza os preços
  // (PRECOS_CUSTOM continua global para os cálculos síncronos, mas o componente
  // agora "sabe" quando precisa redesenhar a tela com os novos valores)
  const [precosVersion,setPrecosVersion] = useState(0);
  React.useEffect(function(){
    var ref = db.ref("config/precos");
    var handler = ref.on("value", function(snap){
      var val = snap.val();
      PRECOS_CUSTOM = val || {};
      setPrecosVersion(v=>v+1);
    });
    return function(){ ref.off("value", handler); };
  }, []);

  return (
    <React.Fragment>
      {fbStatus!=="ok" &&
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:999,
          background:fbStatus==="erro"?"#EF4444":"#FFB800",
          color:fbStatus==="erro"?"#fff":"#000",
          padding:"6px",textAlign:"center",fontSize:12,fontWeight:700}}>
          {fbStatus==="conectando"?"🔄 Conectando ao servidor…":"❌ Erro de conexão"}
        </div>}
      {erroMsg &&
        <div style={{position:"fixed",bottom:16,left:16,right:16,zIndex:1000,
          background:"#1A1A1A",border:"2px solid #EF4444",borderRadius:12,
          padding:"12px 14px",display:"flex",alignItems:"center",gap:10,
          boxShadow:"0 4px 20px rgba(0,0,0,0.5)",maxWidth:440,margin:"0 auto"}}>
          <span style={{fontSize:20,flexShrink:0}}>⚠️</span>
          <span style={{color:"#fff",fontSize:13,fontWeight:600,flex:1}}>{erroMsg}</span>
          <button onClick={()=>setErroMsg(null)} style={{background:"none",border:"none",
            color:"#999",fontSize:18,cursor:"pointer",padding:0,flexShrink:0}}>✕</button>
        </div>}
      {tela==="sel"       && <Selector setTela={setTela} light={light} toggleTema={toggleTema}/>}
      {tela==="garcom"    && <Garcom     setTela={setTela} fila={fila} prontos={prontos}
        clientes={clientes} setClientes={setClientes} consumo={consumo} precosVersion={precosVersion}
        light={light} toggleTema={toggleTema}/>}
      {tela==="caixa"     && <Caixa      setTela={setTela} fila={fila} consumo={consumo}
        prontos={prontos} light={light} toggleTema={toggleTema}/>}
      {tela==="cozinha"   && <Cozinha    setTela={setTela} fila={fila} light={light} toggleTema={toggleTema}/>}
    </React.Fragment>

  );
}

// GARÇOM
// ════════════════════════════════════════════════════════════════════
function Garcom({setTela,fila,prontos,clientes,setClientes,consumo,precosVersion,light,toggleTema}){
  const [aba,setAba] = useState("pedido");
  const [cliente,setCliente] = useState({nome:"",cel:"",email:"",cpf:"",id:null});
  const [mesa,setMesa]       = useState(MESAS[0]);
  const [itens,setItens]     = useState([]);
  const [ativo,setAtivo]     = useState(null);
  const [enviado,setEnviado] = useState(false);
  const [enviando,setEnviando] = useState(false);

  const clienteFiel = cliente.id
    ? clientes.find(c=>c.id===cliente.id)
    : clientes.find(c=>cliente.nome.length>1 && c.nome.toLowerCase()===cliente.nome.toLowerCase());

  function abrirItem(item){
    const eBebida = item.cat.includes("Bebida");
    const temPao = CATS_COM_PAO.includes(item.cat);
    setAtivo({
      item, ing:[...item.ing], obs:"",
      pao:       temPao                              ? "monaco" : null,
      cortado:   temPao                              ? false    : null, // opção de cortar ao meio
      hamburguer:CATS_COM_BURGUER.includes(item.cat) ? TIPOS_HAMBURGUER[0] : null,
      ponto:     CATS_COM_PONTO.includes(item.cat)   ? PONTOS[1] : null,
      tamanho:   item.cat.includes("Porção")         ? "Média" : null,
      // bebidas
      eBebida,
      qtdBebida: eBebida ? 1 : null,
      copos: eBebida ? [{tipo:"Puro",qtd:0},{tipo:"Gelo",qtd:0},{tipo:"Limão e Gelo",qtd:0},{tipo:"Laranja e Gelo",qtd:0}] : null,
    });
  }

  function addCarrinho(){
    if(!ativo) return;
    const removidos = ativo.item.ing.filter(i=>!ativo.ing.includes(i));
    const paoLabel  = ativo.pao ? TIPOS_PAO.find(p=>p.id===ativo.pao)?.label : null;
    const preco = calcularPrecoItem(ativo.item, {
      tamanho: ativo.tamanho, hamburguer: ativo.hamburguer,
      eBebida: ativo.eBebida, qtdBebida: ativo.qtdBebida
    });
    setItens(p=>[...p,{id:Date.now(),item:ativo.item,ing:ativo.ing,
      removidos,obs:ativo.obs,pao:paoLabel,cortado:ativo.cortado||false,
      hamburguer:ativo.hamburguer,ponto:ativo.ponto,tamanho:ativo.tamanho,
      eBebida:ativo.eBebida,qtdBebida:ativo.qtdBebida,copos:ativo.copos,
      preco:preco}]);
    setAtivo(null);
  }

  function enviar(){
    if(!itens.length || enviando) return; // bloqueia clique duplo enquanto processa
    setEnviando(true);
    const agora = new Date();
    const dataStr = agora.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
    const horaStr = agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    proximoNumeroPedido(function(num){
      pushPedido({id:num,mesa,cliente:cliente.nome||"—",itens,
        hora:horaStr,data:dataStr,status:"pendente"});
    });
    // Salvar no histórico do cliente se identificado (persiste no Firebase)
    if(cliente.nome){
      const resumo = itens.map(it=>{
        let s=it.item.nome;
        if(it.removidos?.length) s+=" s/ "+it.removidos.join(", ");
        return s;
      }).join(" + ");
      // Prioridade: ID exato (cliente selecionado no autocomplete) — nunca ambíguo.
      // Fallback: nome digitado manualmente, só se houver exatamente 1 correspondência
      // (evita atualizar a pessoa errada quando há clientes com nomes iguais).
      let clienteAtual = null;
      if(cliente.id){
        clienteAtual = clientes.find(c=>c.id===cliente.id);
      } else {
        const candidatos = clientes.filter(c=>(c.nome||"").toLowerCase()===cliente.nome.toLowerCase());
        if(candidatos.length===1) clienteAtual = candidatos[0];
      }
      if(clienteAtual){
        const novoHist = [...(clienteAtual.historico||[]), {texto:resumo, data:dataStr, hora:horaStr}];
        salvarUmClienteFirebase({...clienteAtual, historico:novoHist});
        // listener Firebase atualiza a lista automaticamente
      }
    }
    setItens([]); setCliente({nome:"",cel:"",email:"",cpf:"",id:null});
    setEnviado(true);
    setEnviando(false);
    setTimeout(()=>setEnviado(false),2500);
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,
      maxWidth:440,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,
        padding:"10px 14px",display:"flex",alignItems:"center",gap:10,
        position:"sticky",top:0,zIndex:60}}>
        <button onClick={()=>setTela("sel")} style={{background:"none",border:"none",
          color:C.muted,fontSize:20,cursor:"pointer",padding:0}}>←</button>
        <span style={{fontSize:18}}>🏎️</span>
        <span style={{fontWeight:900,fontSize:15,color:C.yellow}}>GARAGEM 77</span>
        <div style={{flex:1}}/>
        <button onClick={toggleTema} style={{background:C.card2,border:`1px solid ${C.border}`,
          borderRadius:20,padding:"4px 10px",cursor:"pointer",
          fontSize:12,fontWeight:700,color:C.yellow,marginRight:6}}>
          {light?"🌙":"☀️"}
        </button>
        {itens.length>0 &&
          <span style={{background:C.yellow,color:"#000",borderRadius:20,
            padding:"2px 10px",fontSize:12,fontWeight:800}}>
            {itens.length} {itens.length===1?"item":"itens"}
          </span>}
      </div>
      {/* Banner: lanches prontos para entregar */}
      {prontos && prontos.length>0 &&
        <div style={{background:"#22C55E"}}>
          <div style={{padding:"6px 14px 4px",fontSize:10,fontWeight:800,
            color:"#fff",letterSpacing:1,textTransform:"uppercase"}}>
            ✅ Prontos para entregar
          </div>
          {prontos.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,
              padding:"6px 14px 8px",borderTop:"1px solid #16A34A"}}>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontWeight:900,fontSize:14,color:"#fff"}}>{p.nome}</span>
                <span style={{fontSize:12,color:"#dcfce7",marginLeft:8}}>{p.mesa}</span>
                {p.cliente!=="—" &&
                  <span style={{fontSize:11,color:"#bbf7d0",marginLeft:6}}>{p.cliente}</span>}
              </div>
              <button onClick={()=>dispensarPronto(p.id)} style={{
                background:"#16A34A",border:"1px solid #15803d",borderRadius:8,
                padding:"4px 10px",color:"#fff",cursor:"pointer",
                fontSize:12,fontWeight:800,flexShrink:0}}>
                ✓ OK
              </button>
            </div>
          ))}
        </div>}
      {/* Abas */}
      <div style={{display:"flex",background:C.card,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        {[["pedido","🛒 Pedido"],["clientes","👥 Clientes"],["relatorios","📊 Relatórios"]].map(([id,lb])=>(
          <button key={id} onClick={()=>setAba(id)} style={{
            flex:1,padding:"9px 4px",background:"none",border:"none",
            borderBottom:aba===id?`2px solid ${C.yellow}`:"2px solid transparent",
            color:aba===id?C.yellow:C.muted,cursor:"pointer",
            fontSize:11,fontWeight:aba===id?800:400,whiteSpace:"nowrap"}}>
            {lb}
          </button>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:14}}>
        {aba==="pedido"     && <PedidoPage {...{mesa,setMesa,cliente,setCliente,clienteFiel,
          itens,setItens,ativo,setAtivo,abrirItem,addCarrinho,enviar,enviado,enviando,clientes,setClientes,precosVersion}}/>}
        {aba==="clientes"   && <ClientesPage clientes={clientes} setClientes={setClientes} fila={fila}/>}
        {aba==="relatorios" && <RelatoriosPage clientes={clientes} fila={fila}/>}
      </div>
    </div>
  );
}

        i.sub.toLowerCase().includes(busca.toLowerCase()) ||

            {cats.map(c=>(
              <button key={c} onClick={()=>setCatSel(c)} style={{
                flexShrink:0,padding:"5px 10px",borderRadius:20,border:"none",
                cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap",

              <span style={{fontSize:20,fontWeight:900,color:C.yellow}}>
                R$ {itens.reduce((s,it)=>s+(it.preco||0),0).toFixed(2)}

function ClientesPage({clientes,setClientes,fila}){
  const [busca,setBusca]       = useState("");
  const [novo,setNovo]         = useState({nome:"",cel:"",email:"",cpf:""});
  const [aberto,setAberto]     = useState(false);
  const [clienteSel,setClienteSel] = useState(null);

  const buscaSoDigitos = busca.replace(/\D/g,"");
  const lista = clientes.filter(c=>
    c.nome.toLowerCase().includes(busca.toLowerCase()) ||
    (buscaSoDigitos.length>0 && (c.cel||"").replace(/\D/g,"").includes(buscaSoDigitos)));

  // se tem cliente selecionado, mostra ficha dele
  if(clienteSel){
    return <FichaCliente
      cliente={clienteSel}
      fila={fila}
      onVoltar={()=>setClienteSel(null)}
      onSalvar={dados=>{
        salvarUmClienteFirebase(dados);
        setClienteSel(dados);
        // listener Firebase atualiza a lista automaticamente
      }}
      onExcluir={id=>{
        excluirClienteFirebase(id);
        setClienteSel(null);
        // listener Firebase atualiza a lista automaticamente
      }}
    />;
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <Inp placeholder="🔍 Buscar cliente…" value={busca} onChange={e=>setBusca(e.target.value)}/>
      <button onClick={()=>setAberto(!aberto)} style={{
        background:C.yellow,border:"none",borderRadius:10,padding:"10px",
        color:"#000",fontWeight:800,cursor:"pointer"}}>
        + Novo Cliente
      </button>
      {aberto &&
        <Crd style={{borderColor:C.yellow}}>
          <Inp mt={8} placeholder="Nome" value={novo.nome}
            onChange={e=>setNovo(n=>({...n,nome:e.target.value}))}/>
          <Inp mt={8} placeholder="Celular — (00) 00000-0000" value={novo.cel}
            onChange={e=>setNovo(n=>({...n,cel:maskTel(e.target.value)}))}/>
          <Inp mt={8} placeholder="E-mail (opcional)" value={novo.email}
            onChange={e=>setNovo(n=>({...n,email:e.target.value}))}/>
          <Inp mt={8} placeholder="CPF — 000.000.000-00" value={novo.cpf}
            onChange={e=>setNovo(n=>({...n,cpf:maskCPF(e.target.value)}))}/>
          <button onClick={()=>{
            if(!novo.nome) return;
            const novoCliente = {id:Date.now(),...novo,historico:[],nascimento:"",obs:""};
            salvarUmClienteFirebase(novoCliente);
            // listener Firebase atualiza a lista automaticamente
            setNovo({nome:"",cel:"",email:"",cpf:""}); setAberto(false);
          }} style={{marginTop:10,width:"100%",background:C.yellow,border:"none",
            borderRadius:8,padding:10,color:"#000",fontWeight:800,cursor:"pointer"}}>
            Salvar Cliente
          </button>
        </Crd>}
      {lista.map(c=>(
        <button key={c.id} onClick={()=>setClienteSel(c)} style={{
          background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
          padding:"13px",cursor:"pointer",textAlign:"left",width:"100%",color:C.text}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=C.yellow}
          onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:800,color:C.yellow,fontSize:15}}>{c.nome}</div>
              {c.cel  &&<div style={{fontSize:13,color:C.muted,marginTop:2}}>{c.cel}</div>}
              {c.email&&<div style={{fontSize:12,color:C.muted}}>{c.email}</div>}
              {c.cpf  &&<div style={{fontSize:11,color:C.muted}}>CPF: {c.cpf}</div>}
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
              <span style={{background:C.yellowDim,color:C.yellow,borderRadius:20,
                padding:"2px 10px",fontSize:12,fontWeight:700}}>
                {(c.historico||[]).length} pedidos
              </span>
              <span style={{color:C.muted,fontSize:11}}>Ver ficha →</span>
            </div>
          </div>
          {(c.historico||[]).length>0&&
            <div style={{marginTop:6,fontSize:12,color:C.muted}}>
              Último: {(()=>{
                const h=(c.historico||[]);
                const ult=h[h.length-1];
                return (ult&&typeof ult==="object")?ult.texto:(ult||"");
              })()}
            </div>}
        </button>
      ))}
    </div>
  );
}

// ── FICHA DO CLIENTE ──────────────────────────────────────────────
function FichaCliente({cliente,fila,onVoltar,onSalvar,onExcluir}){
  const [editando,setEditando] = useState(false);
  const [form,setForm]         = useState({...cliente});
  const [confirmarDel,setConfirmarDel] = useState(false);

  // pedidos reais deste cliente na fila atual
  const pedidosCliente = fila.filter(p=>
    p.cliente.toLowerCase()===cliente.nome.toLowerCase());

  function salvar(){
    onSalvar(form);
    setEditando(false);
  }

  // Estatísticas rápidas (histórico pode ter formato antigo string ou novo objeto)
  const totalPedidos = (cliente.historico||[]).length + pedidosCliente.length;
  const lanchesFav = {};
  (cliente.historico||[]).forEach(h=>{
    const texto = (h && typeof h==="object") ? (h.texto||"") : (h||"");
    if(!texto) return;
    texto.split(" + ").forEach(parte=>{
      const nome = parte.split(" s/")[0].split(" c/")[0].trim();
      if(nome) lanchesFav[nome] = (lanchesFav[nome]||0)+1;
    });
  });
  pedidosCliente.forEach(p=>p.itens.forEach(it=>{
    const nome = it.item?.nome || it.nome || "";
    if(nome) lanchesFav[nome] = (lanchesFav[nome]||0)+1;
  }));
  const topLanches = Object.entries(lanchesFav).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:0,minHeight:"100%"}}>
      {/* Header ficha */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={onVoltar} style={{background:"none",border:"none",
          color:C.muted,fontSize:20,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:18,color:C.yellow}}>{cliente.nome}</div>
          <div style={{fontSize:11,color:C.muted}}>Ficha do cliente</div>
        </div>
        <button onClick={()=>setEditando(!editando)} style={{
          background:editando?C.yellowDim:"transparent",
          border:`1.5px solid ${C.yellow}`,borderRadius:8,
          padding:"6px 12px",cursor:"pointer",
          color:C.yellow,fontSize:12,fontWeight:700}}>
          {editando?"✕ Cancelar":"✏️ Editar"}
        </button>
      </div>

      {/* Modo edição */}
      {editando ? (
        <Crd style={{borderColor:C.yellow,marginBottom:14}}>
          <Lbl>Dados do cliente</Lbl>
          <Inp mt={10} placeholder="Nome" value={form.nome}
            onChange={e=>setForm(f=>({...f,nome:e.target.value}))}/>
          <Inp mt={8} placeholder="Celular — (00) 00000-0000" value={form.cel}
            onChange={e=>setForm(f=>({...f,cel:maskTel(e.target.value)}))}/>
          <Inp mt={8} placeholder="E-mail" value={form.email||""}
            onChange={e=>setForm(f=>({...f,email:e.target.value}))}/>
          <Inp mt={8} placeholder="CPF — 000.000.000-00" value={form.cpf}
            onChange={e=>setForm(f=>({...f,cpf:maskCPF(e.target.value)}))}/>
          <Inp mt={8} placeholder="Data de nascimento (dd/mm/aaaa)" value={form.nascimento||""}
            onChange={e=>setForm(f=>({...f,nascimento:e.target.value}))}/>
          <textarea value={form.obs||""} onChange={e=>setForm(f=>({...f,obs:e.target.value}))}
            placeholder="Observações (ex: alergia a glúten, cliente VIP…)"
            style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,
              borderRadius:8,padding:"8px 10px",color:C.text,fontSize:13,
              resize:"none",height:64,boxSizing:"border-box",marginTop:8}}/>
          <button onClick={salvar} style={{
            marginTop:12,width:"100%",background:C.yellow,border:"none",
            borderRadius:8,padding:"11px",color:"#000",fontWeight:900,cursor:"pointer",fontSize:14}}>
            ✓ Salvar alterações
          </button>
          <div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
            {!confirmarDel ?
              <button onClick={()=>setConfirmarDel(true)} style={{

}

function RelatoriosPage({clientes,fila}){
  const [aberto,setAberto] = useState(null);
  const totalItens = fila.reduce((a,p)=>a+p.itens.length,0);

  // 1) Clientes mais frequentes (pelo histórico salvo)
  const clientesFreq = [...clientes]
    .map(c=>({nome:c.nome,cel:c.cel,qtd:(c.historico||[]).length}))
    .filter(c=>c.qtd>0)
    .sort((a,b)=>b.qtd-a.qtd);

  // 2) Lanches mais pedidos (do histórico de todos os clientes)
  const contLanches = {};
  clientes.forEach(c=>(c.historico||[]).forEach(h=>{
    const txt = (h&&typeof h==="object")?(h.texto||""):(h||"");
    txt.split(" + ").forEach(t=>{
      const nome=t.split(" s/")[0].trim();
      if(nome) contLanches[nome]=(contLanches[nome]||0)+1;
    });
  }));
  const topLanches = Object.entries(contLanches).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // 3) Frequência por dia da semana
  const dias=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const contDias={};
  clientes.forEach(c=>(c.historico||[]).forEach(h=>{
    const item=(h&&typeof h==="object")?h:{data:null};
    if(item.data && item.data!=="—"){
      const partes=item.data.split("/");
      if(partes.length===3){
        const dt=new Date(+partes[2],+partes[1]-1,+partes[0]);
        if(!isNaN(dt.getTime())){
          const dia=dias[dt.getDay()];
          contDias[dia]=(contDias[dia]||0)+1;
        }
      }
    }
  }));
  const maxDia=Math.max(1,...Object.values(contDias));

  // 4) Clientes sumidos (último pedido há mais de 30 dias)
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const sumidos = clientes.filter(c=>{
    const h=c.historico||[];
    if(h.length===0) return false;
    const ult=h[h.length-1];
    const dataStr=(ult&&typeof ult==="object")?ult.data:null;
    if(!dataStr||dataStr==="—") return false;
    const partes=dataStr.split("/");
    if(partes.length!==3) return false;
    const dt=new Date(+partes[2],+partes[1]-1,+partes[0]);
    if(isNaN(dt.getTime())) return false;
    return (hoje-dt)/86400000>30;
  }).map(c=>{
    const ult=c.historico[c.historico.length-1];
    return {...c, ultimaVisita:(ult&&typeof ult==="object")?ult.data:"?"};
  });

  // 5) Remoções mais solicitadas (o que os clientes mais tiram)
  const contRem={};
  clientes.forEach(c=>(c.historico||[]).forEach(h=>{
    const txt=(h&&typeof h==="object")?(h.texto||""):(h||"");
    const matches=txt.match(/s\/ [^+]+/g)||[];
    matches.forEach(m=>{
      m.replace("s/ ","").split(", ").forEach(r=>{
        const rTrim=r.trim();
        if(rTrim) contRem[rTrim]=(contRem[rTrim]||0)+1;
      });
    });
  }));
  const topRem=Object.entries(contRem).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // 6) Volume por mesa (fila atual em preparo/aguardando)
  const contMesa={};
  fila.forEach(p=>{ contMesa[p.mesa]=(contMesa[p.mesa]||0)+p.itens.length; });
  const topMesa=Object.entries(contMesa).sort((a,b)=>b[1]-a[1]);

  // 7) Clientes VIP (mais pedidos no histórico)
  const vips=[...clientesFreq].slice(0,5);

  const RELS=[
    {id:"freq",  e:"🏆",t:"Clientes mais frequentes",     c:"#FFB800"},
    {id:"lanch", e:"🍔",t:"Lanches mais pedidos",          c:"#4ECDC4"},
    {id:"dias",  e:"📅",t:"Frequência por dia da semana",  c:"#45B7D1"},
    {id:"sum",   e:"⏱️",t:"Clientes sumidos (+30 dias)",   c:"#EF4444"},
    {id:"pref",  e:"🗂️",t:"Remoções mais solicitadas",     c:"#C084FC"},
    {id:"mesa",  e:"📊",t:"Volume por mesa (fila atual)",  c:"#F472B6"},
    {id:"vip",   e:"🌟",t:"Clientes VIP",                  c:"#FB923C"},
  ];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      <Crd>
        <div style={{display:"flex"}}>
          {[[clientes.length,"clientes"],[fila.length,"pedidos hoje"],[totalItens,"itens hoje"]].map(([n,l],i)=>(
            <div key={i} style={{flex:1,textAlign:"center",
              borderLeft:i>0?`1px solid ${C.border}`:undefined}}>
              <div style={{fontSize:26,fontWeight:900,color:C.yellow}}>{n}</div>
              <div style={{fontSize:10,color:C.muted}}>{l}</div>
            </div>
          ))}
        </div>
      </Crd>

      {RELS.map(r=>(
        <div key={r.id}>
          <button onClick={()=>setAberto(aberto===r.id?null:r.id)}
            style={{width:"100%",background:C.card,borderRadius:12,padding:13,
              border:`1px solid ${aberto===r.id?r.c:C.border}`,
              display:"flex",alignItems:"center",gap:12,cursor:"pointer",
              textAlign:"left",color:C.text,transition:"border-color .15s"}}>
            <div style={{width:38,height:38,borderRadius:10,background:r.c+"22",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:18,flexShrink:0}}>{r.e}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:aberto===r.id?r.c:C.text,fontSize:13}}>{r.t}</div>
            </div>
            <span style={{color:C.muted,fontSize:16}}>{aberto===r.id?"▲":"▼"}</span>
          </button>

          {aberto===r.id && (
            <div style={{background:C.card2,borderRadius:"0 0 12px 12px",
              border:`1px solid ${r.c}`,borderTop:"none",padding:14}}>

              {r.id==="freq" && (clientesFreq.length===0
                ? <Empty/>
                : clientesFreq.slice(0,10).map((c,i)=>(
                  <div key={c.nome} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"7px 0",borderBottom:i<9?`1px solid ${C.border}`:"none"}}>
                    <span style={{fontWeight:900,color:C.yellow,minWidth:22,fontSize:14}}>{i+1}º</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,color:C.text,fontSize:14}}>{c.nome}</div>
                      {c.cel&&<div style={{fontSize:11,color:C.muted}}>{c.cel}</div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:800,color:C.yellow,fontSize:16}}>{c.qtd}</div>
                      <div style={{fontSize:10,color:C.muted}}>pedidos</div>
                    </div>
                  </div>
                )))}

              {r.id==="lanch" && (topLanches.length===0
                ? <Empty/>
                : topLanches.map(([nome,qtd],i)=>(
                  <div key={nome} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"6px 0",borderBottom:i<topLanches.length-1?`1px solid ${C.border}`:"none"}}>
                    <span style={{fontWeight:900,color:"#4ECDC4",minWidth:22}}>{i+1}º</span>
                    <span style={{flex:1,fontSize:13,color:C.text,fontWeight:i<3?700:400}}>{nome}</span>
                    <span style={{fontWeight:800,color:"#4ECDC4"}}>{qtd}×</span>
                    <div style={{width:50,height:4,borderRadius:4,background:C.border}}>
                      <div style={{height:"100%",background:"#4ECDC4",
                        width:`${Math.round(qtd/topLanches[0][1]*100)}%`}}/>
                    </div>
                  </div>
                )))}

              {r.id==="dias" && (Object.keys(contDias).length===0
                ? <Empty/>
                : dias.map(d=>(
                  <div key={d} style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
                    <span style={{minWidth:32,fontSize:13,color:C.text,fontWeight:600}}>{d}</span>
                    <div style={{flex:1,height:20,background:C.border,borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",background:"#45B7D1",borderRadius:4,
                        width:`${Math.round((contDias[d]||0)/maxDia*100)}%`,
                        transition:"width .3s"}}/>
                    </div>
                    <span style={{minWidth:24,textAlign:"right",fontSize:13,
                      color:"#45B7D1",fontWeight:700}}>{contDias[d]||0}</span>
                  </div>
                )))}

              {r.id==="sum" && (sumidos.length===0
                ? <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"10px 0"}}>
                    Nenhum cliente sumido! 🎉
                  </div>
                : sumidos.map((c,i)=>(
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"7px 0",borderBottom:i<sumidos.length-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,color:C.text}}>{c.nome}</div>
                      {c.cel&&<div style={{fontSize:11,color:C.muted}}>{c.cel}</div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:11,color:C.red,fontWeight:600}}>Último:</div>
                      <div style={{fontSize:12,color:C.red,fontWeight:800}}>{c.ultimaVisita}</div>
                    </div>
                  </div>
                )))}

              {r.id==="pref" && (topRem.length===0
                ? <Empty/>
                : topRem.map(([ing,qtd],i)=>(
                  <div key={ing} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"6px 0",borderBottom:i<topRem.length-1?`1px solid ${C.border}`:"none"}}>
                    <span style={{fontWeight:900,color:"#C084FC",minWidth:22}}>{i+1}º</span>
                    <span style={{flex:1,fontSize:13,color:C.text}}>s/ {ing}</span>
                    <span style={{fontWeight:800,color:"#C084FC"}}>{qtd}×</span>
                  </div>
                )))}

              {r.id==="mesa" && (topMesa.length===0
                ? <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"10px 0"}}>
                    Nenhum pedido na fila agora.
                  </div>
                : topMesa.map(([mesa,qtd],i)=>(
                  <div key={mesa} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"6px 0",borderBottom:i<topMesa.length-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{width:14,height:14,borderRadius:"50%",
                      background:CORES_MESA[MESAS.indexOf(mesa)%CORES_MESA.length],flexShrink:0}}/>
                    <span style={{flex:1,fontSize:13,color:C.text,fontWeight:600}}>{mesa}</span>
                    <span style={{fontWeight:800,color:"#F472B6"}}>{qtd} itens</span>
                  </div>
                )))}

              {r.id==="vip" && (vips.length===0
                ? <Empty/>
                : vips.map((c,i)=>(
                  <div key={c.nome} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"7px 0",borderBottom:i<vips.length-1?`1px solid ${C.border}`:"none"}}>
                    <span style={{fontSize:18}}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,color:C.text}}>{c.nome}</div>
                      {c.cel&&<div style={{fontSize:11,color:C.muted}}>{c.cel}</div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:800,color:"#FB923C",fontSize:16}}>{c.qtd}</div>
                      <div style={{fontSize:10,color:C.muted}}>pedidos</div>
                    </div>
                  </div>
                )))}

            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// FINANCEIRO — fechar conta por mesa ou por pessoa
// ════════════════════════════════════════════════════════════════════
function FinanceiroPage({consumo,precosVersion}){
  const [modo,setModo] = useState("mesas"); // mesas | pessoas | precos
  const [selecionado,setSelecionado] = useState(null); // {tipo:'mesa'|'pessoa', valor:string}
  const [itensMarcados,setItensMarcados] = useState([]); // ids selecionados para fechar parcial

  // Agrupar consumo por mesa
  const porMesa = {};
  consumo.forEach(c=>{
    if(!porMesa[c.mesa]) porMesa[c.mesa] = [];
    porMesa[c.mesa].push(c);
  });

  // Agrupar consumo por pessoa identificada (ignora "—")
  const porPessoa = {};
  consumo.forEach(c=>{
    if(c.cliente && c.cliente!=="—"){
      if(!porPessoa[c.cliente]) porPessoa[c.cliente] = [];
      porPessoa[c.cliente].push(c);
    }
  });

  function totalDe(lista){ return lista.reduce((s,c)=>s+(c.preco||0),0); }

  // Tela de detalhe (mesa ou pessoa selecionada)
  if(selecionado){
    const lista = selecionado.tipo==="mesa" ? (porMesa[selecionado.valor]||[]) : (porPessoa[selecionado.valor]||[]);
    const total = totalDe(lista);
    const todosIds = lista.map(c=>c.id);

    function toggleItem(id){
      setItensMarcados(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
    }
    function marcarTodos(){
      setItensMarcados(todosIds.includes(itensMarcados[0])&&itensMarcados.length===todosIds.length ? [] : todosIds);
    }
    function fecharSelecionados(){
      const idsParaFechar = itensMarcados.length>0 ? itensMarcados : todosIds;
      if(idsParaFechar.length===0) return;
      const itensParaFechar = lista.filter(c=>idsParaFechar.includes(c.id));
      fecharContaFirebase(itensParaFechar);
      setItensMarcados([]);
      setSelecionado(null);
    }

    const totalSelecionado = itensMarcados.length>0
      ? totalDe(lista.filter(c=>itensMarcados.includes(c.id)))
      : total;

    return(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <button onClick={()=>{setSelecionado(null);setItensMarcados([]);}} style={{
            background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer",padding:0}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:18,color:C.yellow}}>
              {selecionado.tipo==="mesa"?"🪑 ":"👤 "}{selecionado.valor}
            </div>
            <div style={{fontSize:11,color:C.muted}}>{lista.length} itens consumidos</div>
          </div>
        </div>

        <Crd>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <Lbl>Itens consumidos</Lbl>
            <button onClick={marcarTodos} style={{background:"none",border:"none",
              color:C.yellow,fontSize:11,fontWeight:700,cursor:"pointer"}}>
              {itensMarcados.length===todosIds.length&&todosIds.length>0?"Desmarcar todos":"Marcar todos"}
            </button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {lista.map(c=>{
              const marcado = itensMarcados.includes(c.id);
              return(
                <button key={c.id} onClick={()=>toggleItem(c.id)} style={{
                  display:"flex",alignItems:"center",gap:10,padding:"9px 11px",
                  borderRadius:9,border:`1.5px solid ${marcado?C.yellow:C.border}`,
                  background:marcado?C.yellowDim:"transparent",cursor:"pointer",textAlign:"left"}}>
                  <span style={{fontSize:16}}>{marcado?"☑️":"⬜"}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:C.text}}>
                      {c.nome}{c.qtdBebida>1?` x${c.qtdBebida}`:""}
                    </div>
                    <div style={{fontSize:10,color:C.muted}}>
                      {selecionado.tipo==="mesa" && c.cliente!=="—" ? c.cliente+" · " : ""}{c.hora}
                    </div>
                  </div>
                  <div style={{fontWeight:800,color:C.yellow,fontSize:14}}>
                    R$ {(c.preco||0).toFixed(2)}
                  </div>
                </button>
              );
            })}
          </div>
        </Crd>

}

// ── EDITOR DE PREÇOS ──────────────────────────────────────────────
function PrecosEditor({onVoltar}){
  const [busca,setBusca] = useState("");
  const [precosLocais,setPrecosLocais] = useState({...PRECOS_CUSTOM});
  const [precosTexto,setPrecosTexto] = useState({});
  const [alterado,setAlterado] = useState(false);

  const itensFiltrados = CARDAPIO.filter(i=>
    i.cat!=="🥤 Bebidas" || true // bebidas também editáveis
  ).filter(i=>
    busca.trim()==="" || i.nome.toLowerCase().includes(busca.toLowerCase()));

  function valorAtual(id){
    return precosLocais[id] !== undefined ? precosLocais[id] : precoBase(id);
  }
  function textoAtual(id){
    return precosTexto[id] !== undefined ? precosTexto[id] : valorAtual(id).toFixed(2);
  }
  function setPreco(id, valor){
    // Permite o usuário digitar livremente (ex: "1", "1,", "1,5") sem travar o campo
    setPrecosTexto(p=>({...p, [id]:valor}));
    const limpo = valor.replace(",",".").trim();
    const num = parseFloat(limpo);
    if(!isNaN(num) && num>=0){
      setPrecosLocais(p=>({...p, [id]:num}));
      setAlterado(true);
    }
    // Se inválido (texto, negativo, vazio), não atualiza o preço real —
    // mantém o último valor válido até o usuário corrigir
  }
  function confirmarPreco(id){
    // Ao saída do campo, reformata para 2 decimais e descarta texto inválido
    setPrecosTexto(p=>{ const c={...p}; delete c[id]; return c; });
  }
  function salvar(){
    salvarPrecosFirebase(precosLocais);
    PRECOS_CUSTOM = {...precosLocais};
    setAlterado(false);
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onVoltar} style={{background:"none",border:"none",
          color:C.muted,fontSize:20,cursor:"pointer",padding:0}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:18,color:C.yellow}}>⚙️ Editar Preços</div>
          <div style={{fontSize:11,color:C.muted}}>Os valores aqui sobrescrevem o cardápio padrão</div>
        </div>
        {alterado &&
          <button onClick={salvar} style={{background:C.yellow,border:"none",borderRadius:8,
            padding:"7px 14px",cursor:"pointer",color:"#000",fontWeight:900,fontSize:13}}>
            ✓ Salvar
          </button>}
      </div>

      <Inp placeholder="🔍 Buscar item…" value={busca} onChange={e=>setBusca(e.target.value)}/>

      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {itensFiltrados.map(item=>{
          const textoAtualVal = textoAtual(item.id);
          const limpo = textoAtualVal.replace(",",".").trim();
          const numDigitado = parseFloat(limpo);
          const invalido = textoAtualVal!=="" && (isNaN(numDigitado) || numDigitado<0);
          const precoOriginal = precoBase(item.id);
          const temCustom = precosLocais[item.id]!==undefined && precosLocais[item.id]!==precoOriginal;
          return(
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,
            background:C.card,border:`1px solid ${invalido?C.red:C.border}`,borderRadius:10,padding:"9px 12px"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>{item.nome}</div>
              <div style={{fontSize:10,color:C.muted}}>
                {item.sub}
                {temCustom && <span style={{color:C.muted}}> · padrão: R$ {precoOriginal.toFixed(2)}</span>}
              </div>
              {invalido && <div style={{fontSize:10,color:C.red,fontWeight:700,marginTop:2}}>
                ⚠️ Valor inválido — mantendo o último preço válido
              </div>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontSize:13,color:invalido?C.red:C.muted}}>R$</span>
              <input type="text" value={textoAtualVal}
                onChange={e=>setPreco(item.id, e.target.value)}
                onBlur={()=>confirmarPreco(item.id)}
                style={{width:70,background:C.bg,border:`1.5px solid ${invalido?C.red:C.border}`,
                  borderRadius:7,padding:"6px 8px",color:invalido?C.red:C.yellow,fontWeight:800,
                  fontSize:14,textAlign:"right",outline:"none"}}/>
            </div>
          </div>
          );
        })}
      </div>
    </div>
  );
}

// ── CONTAS DO CAIXA (fechamento por mesa e por pessoa + registro contábil)
function CaixaContas({consumo}){
  const [modo,setModo] = useState("mesas"); // mesas | pessoas | historico
  const [selecionado,setSelecionado] = useState(null);
  const [itensMarcados,setItensMarcados] = useState([]);

  function totalDe(lista){ return lista.reduce((s,c)=>s+(c.preco||0),0); }

  // Agrupamentos
  const porMesa = {};
  consumo.forEach(c=>{
    if(!porMesa[c.mesa]) porMesa[c.mesa] = [];
    porMesa[c.mesa].push(c);
  });
  const porPessoa = {};
  consumo.forEach(c=>{
    if(c.cliente && c.cliente!=="—"){
      if(!porPessoa[c.cliente]) porPessoa[c.cliente] = [];
      porPessoa[c.cliente].push(c);
    }
  });
  const totalGeral = consumo.reduce((s,c)=>s+(c.preco||0),0);

  if(selecionado){
    const lista = selecionado.tipo==="mesa" ? (porMesa[selecionado.valor]||[]) : (porPessoa[selecionado.valor]||[]);
    const total = totalDe(lista);
    const todosIds = lista.map(c=>c.id);

    function toggleItem(id){
      setItensMarcados(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
    }
    function marcarTodos(){
      setItensMarcados(itensMarcados.length===todosIds.length ? [] : todosIds);
    }
    function fechar(){
      const ids = itensMarcados.length>0 ? itensMarcados : todosIds;
      if(!ids.length) return;
      const itensParaFechar = lista.filter(c=>ids.includes(c.id));
      fecharContaFirebase(itensParaFechar);
      setItensMarcados([]);
      setSelecionado(null);
    }
    const totalSel = itensMarcados.length>0
      ? totalDe(lista.filter(c=>itensMarcados.includes(c.id)))
      : total;

    return(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>{setSelecionado(null);setItensMarcados([]);}} style={{
            background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer",padding:0}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:18,color:C.yellow}}>
              {selecionado.tipo==="mesa"?"🪑 ":"👤 "}{selecionado.valor}
            </div>
            <div style={{fontSize:11,color:C.muted}}>{lista.length} itens consumidos</div>
          </div>
        </div>

        <Crd>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <Lbl>Itens consumidos</Lbl>
            <button onClick={marcarTodos} style={{background:"none",border:"none",
              color:C.yellow,fontSize:11,fontWeight:700,cursor:"pointer"}}>
              {itensMarcados.length===todosIds.length&&todosIds.length>0?"Desmarcar todos":"Marcar todos"}
            </button>
          </div>
          {lista.map(c=>{
            const marcado = itensMarcados.includes(c.id);
            return(
              <button key={c.id} onClick={()=>toggleItem(c.id)} style={{
                display:"flex",alignItems:"center",gap:10,padding:"9px 11px",width:"100%",
                borderRadius:9,border:`1.5px solid ${marcado?C.yellow:C.border}`,
                background:marcado?C.yellowDim:"transparent",cursor:"pointer",
                textAlign:"left",marginBottom:6}}>
                <span style={{fontSize:16}}>{marcado?"☑️":"⬜"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.text}}>
                    {c.nome}{c.qtdBebida>1?` ×${c.qtdBebida}`:""}
                  </div>
                  <div style={{fontSize:10,color:C.muted}}>
                    {selecionado.tipo==="mesa" && c.cliente!=="—" ? c.cliente+" · " : ""}{c.hora}
                  </div>
                </div>
                <div style={{fontWeight:800,color:C.yellow,fontSize:14,flexShrink:0}}>
                  R$ {(c.preco||0).toFixed(2)}
                </div>
              </button>
            );
          })}
        </Crd>

        <Crd style={{borderColor:C.yellow}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:C.muted}}>
                {itensMarcados.length>0?`${itensMarcados.length} itens selecionados`:"Total da conta"}
              </div>
              <div style={{fontSize:26,fontWeight:900,color:C.yellow}}>
                R$ {totalSel.toFixed(2)}
              </div>
            </div>
            <button onClick={fechar} style={{
              background:C.green,border:"none",borderRadius:10,padding:"12px 20px",
              color:"#fff",fontWeight:900,fontSize:14,cursor:"pointer"}}>
              ✓ Fechar conta
            </button>
          </div>
        </Crd>
      </div>
    );
  }

  const grupos = modo==="mesas" ? porMesa : modo==="pessoas" ? porPessoa : {};
  const chaves = Object.keys(grupos).sort();

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <Crd>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:C.muted}}>Total em aberto</div>
            <div style={{fontSize:24,fontWeight:900,color:C.yellow}}>R$ {totalGeral.toFixed(2)}</div>
          </div>
          <div style={{fontSize:11,color:C.muted,textAlign:"right"}}>
            <div>{consumo.length} itens</div>
            <div>{Object.keys(porMesa).length} mesas</div>
          </div>
        </div>
      </Crd>

      <div style={{display:"flex",gap:6}}>
        {[["mesas","🪑 Por Mesa"],["pessoas","👤 Por Pessoa"]].map(([id,lb])=>(
          <Chip key={id} ativo={modo===id} cor={C.yellow} onClick={()=>setModo(id)}>{lb}</Chip>
        ))}
      </div>

      {chaves.length===0 &&
        <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"30px 0"}}>
          {modo==="mesas"
            ? "Nenhuma conta em aberto."
            : "Nenhum consumo identificado por nome. Informe o nome do cliente ao fazer o pedido."}
        </div>}

      {chaves.map(chave=>{
        const lista = grupos[chave];
        const total = totalDe(lista);
        return(
          <button key={chave} onClick={()=>setSelecionado({tipo:modo==="mesas"?"mesa":"pessoa",valor:chave})}
            style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
              padding:"13px",cursor:"pointer",textAlign:"left",width:"100%",color:C.text}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.yellow}
            onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:800,color:C.yellow,fontSize:15}}>
                  {modo==="mesas"?"🪑 ":"👤 "}{chave}
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{lista.length} itens</div>
              </div>
              <div style={{fontWeight:900,color:C.text,fontSize:18}}>
                R$ {total.toFixed(2)}
              </div>
            </div>
          </button>
        );
      })}
    </div>
  );
}
