// ── FUNÇÕES FIREBASE
// (Firebase já inicializado no head — db disponível globalmente)
// Contador sequencial de pedidos (reinicia a cada dia)
let _contadorPedido = 1;
function proximoNumeroPedido(cb){
  const hoje = new Date().toISOString().slice(0,10).replace(/-/g,"");
  const ref = db.ref("contadores/"+hoje);
  ref.transaction(val=>{ return (val||0)+1; }, (err,ok,snap)=>{
    if(ok) cb(snap.val());
    else cb(_contadorPedido++);
  });
}

function pushPedido(pedido){
  // Serializar item (remover referências circulares, manter só o necessário)
  const pedidoLimpo = {
    id: pedido.id,
    mesa: pedido.mesa,
    cliente: pedido.cliente,
    hora: pedido.hora,
    data: pedido.data,
    status: pedido.status,
    itens: pedido.itens.map(it=>({
      id: it.id,
      nome: it.item.nome,
      sub: it.item.sub || "",
      cat: it.item.cat,
      ing: it.ing || [],
      ingOriginal: it.item.ing || [],
      removidos: it.removidos || [],
      obs: it.obs || "",
      pao: it.pao || null,
      hamburguer: it.hamburguer || null,
      ponto: it.ponto || null,
      tamanho: it.tamanho || null,
      eBebida: it.eBebida || false,
      qtdBebida: it.qtdBebida || null,
      copos: it.copos || null,
    }))
  };
  db.ref("pedidos/"+pedido.id).set(pedidoLimpo);
}

function finalizarItemFirebase(pedidoId, itemId, itensTotais, pedidoInfo){
  // Salvar no nó "prontos" para notificar o garçom
  const itemPronto = itensTotais.find(i=>i.id===itemId);
  if(itemPronto){
    const prontoId = pedidoId+"_"+itemId;
    db.ref("prontos/"+prontoId).set({
      id: prontoId,
      pedidoId, mesa: pedidoInfo.mesa,
      cliente: pedidoInfo.cliente,
      nome: itemPronto.nome,
      hora: new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
      ts: Date.now()
    });
  }
  // Remover da fila
  const restantes = itensTotais.filter(i=>i.id!==itemId);
  if(restantes.length===0){
    db.ref("pedidos/"+pedidoId).remove();
  } else {
    db.ref("pedidos/"+pedidoId+"/itens").set(restantes);
  }
}

function salvarClientesFirebase(clientes){
  const obj={};
  // Garantir chave string para o Firebase não virar array
  clientes.forEach(c=>{ obj["c"+c.id]=c; });
  db.ref("clientes").set(obj);
}
function salvarUmClienteFirebase(cliente){
  // Salvar histórico como string JSON para evitar problemas com arrays no Firebase
  const clienteLimpo = {
    id: cliente.id,
    nome: cliente.nome || "",
    cel: cliente.cel || "",
    email: cliente.email || "",
    cpf: cliente.cpf || "",
    nascimento: cliente.nascimento || "",
    obs: cliente.obs || "",
    historicoJSON: JSON.stringify(cliente.historico || []),
  };
  db.ref("clientes/c"+cliente.id).set(clienteLimpo);
}
function excluirClienteFirebase(id){
  db.ref("clientes/c"+id).remove();
}

// ── MÁSCARAS
function maskTel(v){
  const d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<=2)  return d.length?"("+d:"";
  if(d.length<=6)  return "("+d.slice(0,2)+") "+d.slice(2);
  if(d.length<=10) return "("+d.slice(0,2)+") "+d.slice(2,6)+"-"+d.slice(6);
  return "("+d.slice(0,2)+") "+d.slice(2,7)+"-"+d.slice(7);
}
function maskCPF(v){
  const d=v.replace(/\D/g,"").slice(0,11);
  if(d.length<=3)  return d;
  if(d.length<=6)  return d.slice(0,3)+"."+d.slice(3);
  if(d.length<=9)  return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6);
  return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6,9)+"-"+d.slice(9);
}

function App(){
  const [tela,setTela]         = useState("sel");
  const [fila,setFila]         = useState([]);
  const [clientes,setClientes] = useState([]);
  const [light,setLight]       = useState(false);
  const [fbStatus,setFbStatus] = useState("conectando"); // conectando | ok | erro

  // ── Escutar fila em tempo real
  React.useEffect(()=>{
    const ref = db.ref("pedidos");
    const handler = ref.on("value", snap=>{
      const val = snap.val();
      if(!val){ setFila([]); setFbStatus("ok"); return; }
      // Remontar objetos com estrutura que o app espera
      const lista = Object.values(val).map(p=>({
        ...p,
        itens: (p.itens||[]).map(it=>({
          ...it,
          item:{ nome:it.nome, sub:it.sub, cat:it.cat, ing:it.ingOriginal||[] }
        }))
      })).sort((a,b)=>a.id-b.id);
      setFila(lista);
      setFbStatus("ok");
    }, err=>{ console.error(err); setFbStatus("erro"); });
    return ()=>ref.off("value",handler);
  },[]);

  // ── Escutar clientes em tempo real
  React.useEffect(()=>{
    const ref = db.ref("clientes");
    const handler = ref.on("value", snap=>{
      const val = snap.val();
      if(!val){ setClientes([]); setFbStatus("ok"); return; }
      const lista = Object.values(val).map(c=>{
        // Reconstruir histórico do JSON salvo
        let hist = [];
        try { hist = JSON.parse(c.historicoJSON || "[]"); } catch(e){ hist=[]; }
        return { ...c, historico: hist };
      }).sort((a,b)=>(a.nome||"").localeCompare(b.nome||""));
      setClientes(lista);
      setFbStatus("ok");
    }, err=>{ console.error(err); setFbStatus("erro"); });
    return ()=>ref.off("value",handler);
  },[]);

  // ── Escutar prontos em tempo real
  const [prontos,setProntos] = useState([]);
  React.useEffect(()=>{
    const ref = db.ref("prontos");
    const handler = ref.on("value", snap=>{
      const val = snap.val();
      if(!val){ setProntos([]); return; }
      setProntos(Object.values(val).sort((a,b)=>b.ts-a.ts));
    });
    return ()=>ref.off("value",handler);
  },[]);

  function dispensarPronto(id){ db.ref("prontos/"+id).remove(); }

  C = mkC(light);
  const toggleTema = ()=>setLight(l=>!l);

  return(
    <>
      {/* Indicador de conexão Firebase */}
      {fbStatus!=="ok" &&
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:999,
          background:fbStatus==="erro"?"#EF4444":"#FFB800",
          color:fbStatus==="erro"?"#fff":"#000",
          padding:"6px",textAlign:"center",fontSize:12,fontWeight:700}}>
          {fbStatus==="conectando"?"🔄 Conectando ao servidor…":"❌ Erro de conexão — verifique a internet"}
        </div>}
      {tela==="sel"     && <Selector setTela={setTela} light={light} toggleTema={toggleTema}/>}
      {tela==="garcom"  && <Garcom   setTela={setTela} fila={fila}
        clientes={clientes} setClientes={setClientes}
        prontos={prontos} dispensarPronto={dispensarPronto}
        light={light} toggleTema={toggleTema}/>}
      {tela==="cozinha" && <Cozinha  setTela={setTela} fila={fila}
        light={light} toggleTema={toggleTema}/>}
    </>
  );
}

// GARÇOM
// ════════════════════════════════════════════════════════════════════
function Garcom({setTela,fila,clientes,setClientes,prontos,dispensarPronto,light,toggleTema}){
  const [aba,setAba] = useState("pedido");
  const [cliente,setCliente] = useState({nome:"",cel:"",email:"",cpf:""});
  const [mesa,setMesa]       = useState(MESAS[0]);
  const [itens,setItens]     = useState([]);
  const [ativo,setAtivo]     = useState(null);
  const [enviado,setEnviado] = useState(false);

  const clienteFiel = clientes.find(c=>
    cliente.nome.length>1 && c.nome.toLowerCase()===cliente.nome.toLowerCase());

  function abrirItem(item){
    const eBebida = item.cat.includes("Bebida");
    setAtivo({
      item, ing:[...item.ing], obs:"",
      pao:       CATS_COM_PAO.includes(item.cat)     ? "monaco" : null,
      hamburguer:CATS_COM_BURGUER.includes(item.cat) ? TIPOS_HAMBURGUER[0] : null,
      ponto:     CATS_COM_PONTO.includes(item.cat)   ? PONTOS[1] : null,
      tamanho:   item.cat.includes("Porção")         ? "Média" : null,
      // bebidas
      eBebida,
      qtdBebida: eBebida ? 1 : null,
      copos: eBebida ? [{tipo:"Puro",qtd:0},{tipo:"Gelo",qtd:0},{tipo:"Limão e Gelo",qtd:0},{tipo:"Laranja e Gelo",qtd:0}] : null,
    });
  }

  function addCarrinho(){
    if(!ativo) return;
    const removidos = ativo.item.ing.filter(i=>!ativo.ing.includes(i));
    const paoLabel  = ativo.pao ? TIPOS_PAO.find(p=>p.id===ativo.pao)?.label : null;
    setItens(p=>[...p,{id:Date.now(),item:ativo.item,ing:ativo.ing,
      removidos,obs:ativo.obs,pao:paoLabel,
      hamburguer:ativo.hamburguer,ponto:ativo.ponto,tamanho:ativo.tamanho,
      eBebida:ativo.eBebida,qtdBebida:ativo.qtdBebida,copos:ativo.copos}]);
    setAtivo(null);
  }

  function enviar(){
    if(!itens.length) return;
    const agora = new Date();
    const dataStr = agora.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
    const horaStr = agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    // Número sequencial do pedido (ex: 1, 2, 3...)
    proximoNumeroPedido(num=>{
      pushPedido({id:num,mesa,cliente:cliente.nome||"—",itens,
        hora:horaStr,data:dataStr,status:"aguardando"});
    });
    // Salvar no histórico do cliente se identificado
    if(cliente.nome){
      const resumo = itens.map(it=>{
        let s=it.item.nome;
        if(it.removidos?.length) s+=" s/ "+it.removidos.join(", ");
        return s;
      }).join(" + ");
      const clienteAtual = clientes.find(c=>(c.nome||"").toLowerCase()===cliente.nome.toLowerCase());
      if(clienteAtual){
        const novoHist = [...(clienteAtual.historico||[]), {texto:resumo, data:dataStr, hora:horaStr}];
        const atualizado = {...clienteAtual, historico: novoHist};
        salvarUmClienteFirebase(atualizado);
        // listener Firebase atualiza automaticamente
      }
    }
    setItens([]); setCliente({nome:"",cel:"",email:"",cpf:""});
    setEnviado(true); setTimeout(()=>setEnviado(false),2500);
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,
      maxWidth:440,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,
        padding:"10px 14px",display:"flex",alignItems:"center",gap:10,
        position:"sticky",top:0,zIndex:60}}>
        <button onClick={()=>setTela("sel")} style={{background:"none",border:"none",
          color:C.muted,fontSize:20,cursor:"pointer",padding:0}}>←</button>
        <span style={{fontSize:18}}>🏎️</span>
        <span style={{fontWeight:900,fontSize:15,color:C.yellow}}>GARAGEM 77</span>
        <div style={{flex:1}}/>
        <button onClick={toggleTema} style={{background:C.card2,border:`1px solid ${C.border}`,
          borderRadius:20,padding:"4px 10px",cursor:"pointer",
          fontSize:12,fontWeight:700,color:C.yellow,marginRight:6}}>
          {light?"🌙":"☀️"}
        </button>
        {itens.length>0 &&
          <span style={{background:C.yellow,color:"#000",borderRadius:20,
            padding:"2px 10px",fontSize:12,fontWeight:800}}>
            {itens.length} {itens.length===1?"item":"itens"}
          </span>}
      </div>
      {/* ── BANNER PRONTOS ── */}
      {prontos.length>0 &&
        <div style={{background:"#22C55E",padding:"0"}}>
          <div style={{padding:"6px 14px 4px",fontSize:10,fontWeight:800,
            color:"#fff",letterSpacing:1,textTransform:"uppercase"}}>
            ✅ Prontos para entregar
          </div>
          {prontos.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",
              gap:10,padding:"6px 14px 8px",borderTop:"1px solid #16A34A"}}>
              <div style={{flex:1}}>
                <span style={{fontWeight:900,fontSize:14,color:"#fff"}}>{p.nome}</span>
                <span style={{fontSize:12,color:"#dcfce7",marginLeft:8}}>{p.mesa}</span>
                {p.cliente!=="—" &&
                  <span style={{fontSize:11,color:"#bbf7d0",marginLeft:6}}>{p.cliente}</span>}
              </div>
              <button onClick={()=>dispensarPronto(p.id)} style={{
                background:"#16A34A",border:"1px solid #15803d",
                borderRadius:8,padding:"4px 10px",color:"#fff",
                cursor:"pointer",fontSize:12,fontWeight:800,flexShrink:0}}>
                ✓ OK
              </button>
            </div>
          ))}
        </div>}
      {/* Abas */}
      <div style={{display:"flex",background:C.card,borderBottom:`1px solid ${C.border}`}}>
        {[["pedido","🛒 Pedido"],["clientes","👥 Clientes"],["relatorios","📊 Relatórios"]].map(([id,lb])=>(
          <button key={id} onClick={()=>setAba(id)} style={{
            flex:1,padding:"9px 4px",background:"none",border:"none",
            borderBottom:aba===id?`2px solid ${C.yellow}`:"2px solid transparent",
            color:aba===id?C.yellow:C.muted,cursor:"pointer",
            fontSize:11,fontWeight:aba===id?800:400}}>
            {lb}
          </button>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:14}}>
        {aba==="pedido"    && <PedidoPage {...{mesa,setMesa,cliente,setCliente,clienteFiel,
          itens,setItens,ativo,setAtivo,abrirItem,addCarrinho,enviar,enviado,clientes,setClientes}}/>}
        {aba==="clientes"  && <ClientesPage clientes={clientes} setClientes={setClientes} fila={fila}/>}
        {aba==="relatorios"&& <RelatoriosPage clientes={clientes} fila={fila}/>}
      </div>
    </div>
  );
}

              top:"50%",transform:"translateY(-50%)",background:"none",border:"none",

          </div>
          {/* Categorias — só mostra se não estiver buscando */}

            {cats.map(c=>(
              <button key={c} onClick={()=>setCatSel(c)} style={{
                flexShrink:0,padding:"5px 10px",borderRadius:20,border:"none",
                cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap",
                background:catSel===c?C.yellow:C.card2,
                color:catSel===c?"#000":C.muted}}>

                <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>

                </div>
                <button onClick={()=>setItens(p=>p.filter(x=>x.id!==it.id))} style={{
                  background:C.red+"22",border:"none",color:C.red,
                  borderRadius:6,padding:"2px 7px",cursor:"pointer",fontSize:12}}>✕</button>

            ))}

              width:"100%",marginTop:14,padding:"13px",borderRadius:12,border:"none",
              background:enviado?C.green:C.yellow,color:enviado?"#fff":"#000",
              cursor:"pointer",fontWeight:900,fontSize:15}}>
              {enviado?"✓ Enviado para Cozinha!":"🚀 Enviar para Cozinha"}
            </button>
          </Crd>}
      </>}
    </div>
  );
}

// ── FICHA DO CLIENTE — totalmente editável inline ─────────────────
function FichaCliente({cliente,fila,onVoltar,onSalvar,onExcluir}){
  const [form,setForm]         = useState({...cliente});
  const [alterado,setAlterado] = useState(false);
  const [confirmarDel,setConfirmarDel] = useState(false);
  const [abaAtiva,setAbaAtiva] = useState("dados"); // dados | historico | ativos

  // Sincronizar form quando cliente mudar (ex: listener Firebase)
  React.useEffect(()=>{ setForm({...cliente}); setAlterado(false); },[cliente.id]);

  const pedidosCliente = fila.filter(p=>
    (p.cliente||"").toLowerCase()===(cliente.nome||"").toLowerCase());

  const totalPedidos = (cliente.historico||[]).length + pedidosCliente.length;

  const lanchesFav = {};
  (cliente.historico||[]).forEach(h=>{
    const texto = typeof h==="object" ? h.texto : h;
    texto.split(" + ").forEach(t=>{
      const nome = t.split(" s/")[0].trim();
      lanchesFav[nome] = (lanchesFav[nome]||0)+1;
    });
  });
  const topLanches = Object.entries(lanchesFav).sort((a,b)=>b[1]-a[1]).slice(0,5);

  function campo(f,v){ setForm(p=>({...p,[f]:v})); setAlterado(true); }
  function salvar(){ onSalvar(form); setAlterado(false); }

  const inStyle = (foco)=>({
    width:"100%", background:C.bg,
    border:`1.5px solid ${foco?C.yellow:C.border}`,

          <div style={{fontWeight:900,fontSize:18,color:C.yellow,lineHeight:1}}>
            {form.nome||"Cliente"}

          <div style={{fontSize:11,color:C.muted,marginTop:2}}>

        </div>
        {alterado &&

            ✓ Salvar
          </button>}
      </div>

      {/* ── Sub-abas ── */}
      <div style={{display:"flex",gap:0,marginBottom:12,
        borderBottom:`1px solid ${C.border}`,flexShrink:0}}>

          <button key={id} onClick={()=>setAbaAtiva(id)} style={{

            borderBottom:abaAtiva===id?`2px solid ${C.yellow}`:"2px solid transparent",

function RelatoriosPage({clientes,fila}){
  const [aberto,setAberto] = useState(null);
  const totalItens = fila.reduce((a,p)=>a+p.itens.length,0);

  // ── Cálculos dos relatórios ──────────────────────────────

  // 1) Clientes mais frequentes
  const clientesFreq = [...clientes]
    .map(c=>({nome:c.nome,cel:c.cel,qtd:(c.historico||[]).length}))
    .filter(c=>c.qtd>0)
    .sort((a,b)=>b.qtd-a.qtd);

  // 2) Lanches mais pedidos (do histórico de todos os clientes)
  const contLanches = {};
  clientes.forEach(c=>(c.historico||[]).forEach(h=>{
    const txt = typeof h==="object"?h.texto:h;
    txt.split(" + ").forEach(t=>{
      const nome=t.split(" s/")[0].trim();
      if(nome) contLanches[nome]=(contLanches[nome]||0)+1;
    });
  }));
  const topLanches = Object.entries(contLanches).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // 3) Frequência por dia da semana (do histórico)
  const dias=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const contDias={};
  clientes.forEach(c=>(c.historico||[]).forEach(h=>{
    const item=typeof h==="object"?h:{data:null};
    if(item.data && item.data!=="—"){
      const [d,m,a]=item.data.split("/");
      const dt=new Date(+a,+m-1,+d);
      const dia=dias[dt.getDay()];
      contDias[dia]=(contDias[dia]||0)+1;
    }
  }));
  const maxDia=Math.max(1,...Object.values(contDias));

  // 4) Clientes sumidos (último pedido > 30 dias atrás)
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const sumidos = clientes.filter(c=>{
    const h=c.historico||[];
    if(h.length===0) return false;
    const ult=h[h.length-1];
    const dataStr=typeof ult==="object"?ult.data:null;
    if(!dataStr||dataStr==="—") return false;
    const [d,m,a]=dataStr.split("/");
    const dt=new Date(+a,+m-1,+d);
    return (hoje-dt)/(86400000)>30;
  }).map(c=>{
    const ult=c.historico[c.historico.length-1];
    return {...c, ultimaVisita:typeof ult==="object"?ult.data:"?"};
  });

  // 5) Preferências de personalização (remoções mais comuns)
  const contRem={};
  clientes.forEach(c=>(c.historico||[]).forEach(h=>{
    const txt=typeof h==="object"?h.texto:h;
    const match=txt.match(/s\/ (.+?)(?= \+|$)/g)||[];
    match.forEach(m=>{
      m.replace("s/ ","").split(", ").forEach(r=>{
        if(r) contRem[r]=(contRem[r]||0)+1;
      });
    });
  }));
  const topRem=Object.entries(contRem).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // 6) Volume por mesa (fila atual)
  const contMesa={};
  fila.forEach(p=>{ contMesa[p.mesa]=(contMesa[p.mesa]||0)+p.itens.length; });
  const topMesa=Object.entries(contMesa).sort((a,b)=>b[1]-a[1]);

  // 7) Clientes VIP (mais pedidos)
  const vips=[...clientesFreq].slice(0,5);

  const RELS=[
    {id:"freq",  e:"🏆",t:"Clientes mais frequentes",     c:"#FFB800"},
    {id:"lanch", e:"🍔",t:"Lanches mais pedidos",          c:"#4ECDC4"},
    {id:"dias",  e:"📅",t:"Frequência por dia da semana",  c:"#45B7D1"},
    {id:"sum",   e:"⏱️",t:"Clientes sumidos (+30 dias)",   c:"#EF4444"},
    {id:"pref",  e:"🗂️",t:"Remoções mais solicitadas",     c:"#C084FC"},
    {id:"mesa",  e:"📊",t:"Volume por mesa (hoje)",         c:"#F472B6"},
    {id:"vip",   e:"🌟",t:"Clientes VIP",                  c:"#FB923C"},
  ];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      {/* Resumo */}
      <Crd>
        <div style={{display:"flex"}}>
          {[[clientes.length,"clientes"],[fila.length,"pedidos hoje"],[totalItens,"itens hoje"]].map(([n,l],i)=>(
            <div key={i} style={{flex:1,textAlign:"center",
              borderLeft:i>0?`1px solid ${C.border}`:undefined}}>
              <div style={{fontSize:26,fontWeight:900,color:C.yellow}}>{n}</div>
              <div style={{fontSize:10,color:C.muted}}>{l}</div>
            </div>
          ))}
        </div>
      </Crd>

      {RELS.map(r=>(
        <div key={r.id}>
          {/* Botão do relatório */}

            style={{width:"100%",background:C.card,borderRadius:12,padding:13,
              border:`1px solid ${aberto===r.id?r.c:C.border}`,
              display:"flex",alignItems:"center",gap:12,cursor:"pointer",
              textAlign:"left",color:C.text,transition:"border-color .15s"}}>

              {r.id==="lanch" && (topLanches.length===0
                ? <Empty/>
                : topLanches.map(([nome,qtd],i)=>(
                  <div key={nome} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"6px 0",borderBottom:i<topLanches.length-1?`1px solid ${C.border}`:"none"}}>
                    <span style={{fontWeight:900,color:"#4ECDC4",minWidth:22}}>{i+1}º</span>
                    <span style={{flex:1,fontSize:13,color:C.text,fontWeight:i<3?700:400}}>{nome}</span>
                    <span style={{fontWeight:800,color:"#4ECDC4"}}>{qtd}×</span>
                    <div style={{width:50,height:4,borderRadius:4,background:C.border}}>
                      <div style={{height:"100%",background:"#4ECDC4",
                        width:`${Math.round(qtd/topLanches[0][1]*100)}%`}}/>
                    </div>
                  </div>
                )))}

              {/* 📅 Frequência por dia */}
              {r.id==="dias" && (Object.keys(contDias).length===0
                ? <Empty/>
                : dias.map(d=>(
                  <div key={d} style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
                    <span style={{minWidth:32,fontSize:13,color:C.text,fontWeight:600}}>{d}</span>
                    <div style={{flex:1,height:20,background:C.border,borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",background:"#45B7D1",borderRadius:4,
                        width:`${Math.round((contDias[d]||0)/maxDia*100)}%`,
                        transition:"width .3s"}}/>
                    </div>
                    <span style={{minWidth:24,textAlign:"right",fontSize:13,
                      color:"#45B7D1",fontWeight:700}}>{contDias[d]||0}</span>
                  </div>
                )))}

              {/* ⏱️ Clientes sumidos */}
              {r.id==="sum" && (sumidos.length===0
                ? <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"10px 0"}}>
                    Nenhum cliente sumido! 🎉
                  </div>
                : sumidos.map((c,i)=>(
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"7px 0",borderBottom:i<sumidos.length-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,color:C.text}}>{c.nome}</div>
                      {c.cel&&<div style={{fontSize:11,color:C.muted}}>{c.cel}</div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:11,color:C.red,fontWeight:600}}>Último:</div>
                      <div style={{fontSize:12,color:C.red,fontWeight:800}}>{c.ultimaVisita}</div>
                    </div>
                  </div>
                )))}

              {/* 🗂️ Remoções mais solicitadas */}
              {r.id==="pref" && (topRem.length===0
                ? <Empty/>
                : topRem.map(([ing,qtd],i)=>(
                  <div key={ing} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"6px 0",borderBottom:i<topRem.length-1?`1px solid ${C.border}`:"none"}}>
                    <span style={{fontWeight:900,color:"#C084FC",minWidth:22}}>{i+1}º</span>
                    <span style={{flex:1,fontSize:13,color:C.text}}>s/ {ing}</span>
                    <span style={{fontWeight:800,color:"#C084FC"}}>{qtd}×</span>
                  </div>
                )))}

              {/* 📊 Volume por mesa */}
              {r.id==="mesa" && (topMesa.length===0
                ? <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"10px 0"}}>
                    Nenhum pedido hoje ainda.
                  </div>
                : topMesa.map(([mesa,qtd],i)=>(
                  <div key={mesa} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"6px 0",borderBottom:i<topMesa.length-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{width:14,height:14,borderRadius:"50%",
                      background:CORES_MESA[MESAS.indexOf(mesa)%CORES_MESA.length],flexShrink:0}}/>
                    <span style={{flex:1,fontSize:13,color:C.text,fontWeight:600}}>{mesa}</span>
                    <span style={{fontWeight:800,color:"#F472B6"}}>{qtd} itens</span>
                  </div>
                )))}

              {/* 🌟 Clientes VIP */}
              {r.id==="vip" && (vips.length===0
                ? <Empty/>
                : vips.map((c,i)=>(
                  <div key={c.nome} style={{display:"flex",alignItems:"center",gap:10,
                    padding:"7px 0",borderBottom:i<vips.length-1?`1px solid ${C.border}`:"none"}}>
                    <span style={{fontSize:18}}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,color:C.text}}>{c.nome}</div>
                      {c.cel&&<div style={{fontSize:11,color:C.muted}}>{c.cel}</div>}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:800,color:"#FB923C",fontSize:16}}>{c.qtd}</div>
                      <div style={{fontSize:10,color:C.muted}}>pedidos</div>
                    </div>
                  </div>
                )))}

            </div>
          )}
        </div>
      ))}
    </div>
  );
}
function Empty(){ return <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"10px 0"}}>Sem dados suficientes ainda.</div>; }

// ════════════════════════════════════════════════════════════════════
// COZINHA
// ════════════════════════════════════════════════════════════════════
function Cozinha({setTela,fila,setFila,light,toggleTema}){
  const [preparando,setPreparando] = useState([]);

  const mesaCor={};
  [...new Set(fila.map(p=>p.mesa))].forEach((m,i)=>{mesaCor[m]=CORES_MESA[i%CORES_MESA.length];});

  function toggle(pid,iid){
    const k=`${pid}-${iid}`;
    setPreparando(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);
  }
  function finalizar(pid,iid){
    setPreparando(p=>p.filter(x=>x!==`${pid}-${iid}`));
    // Atualizar no Firebase
    const pedido = fila.find(p=>p.id===pid);
    if(pedido) finalizarItemFirebase(pid, iid, pedido.itens, pedido);
    // Estado local atualiza via listener do Firebase automaticamente
  }

  const emPreparo=[];
  fila.forEach(ped=>ped.itens.forEach(it=>{
    if(preparando.includes(`${ped.id}-${it.id}`)) emPreparo.push({ped,it});
  }));
  const cols=emPreparo.length<=1?"1fr":emPreparo.length===2?"1fr 1fr":"1fr 1fr 1fr";

  return(
    <div style={{height:"100vh",background:C.bg,color:C.text,
      display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,
        padding:"9px 18px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={()=>setTela("sel")} style={{background:"none",border:"none",
          color:C.muted,cursor:"pointer",fontSize:18,padding:0}}>←</button>
        <span style={{fontSize:20}}>🏎️</span>
        <span style={{fontWeight:900,fontSize:17,color:C.yellow}}>GARAGEM 77</span>
        <span style={{color:C.muted,fontSize:13,marginLeft:2}}>— Cozinha</span>
        <div style={{flex:1}}/>
        <button onClick={toggleTema} style={{background:C.card2,border:`1px solid ${C.kBorder||C.border}`,
          borderRadius:20,padding:"4px 10px",cursor:"pointer",
          fontSize:12,fontWeight:700,color:C.yellow,marginRight:4}}>
          {light?"🌙":"☀️"}
        </button>
        <KTag c="#FFB800">{fila.reduce((a,p)=>a+p.itens.length,0)} na fila</KTag>
        <KTag c="#22C55E">{emPreparo.length} preparando</KTag>
      </div>
      {/* Layout */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* FILA LATERAL */}
        <div style={{width:270,flexShrink:0,background:C.card,
          borderRight:`1px solid #272727`,overflowY:"auto",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.border}`,
            fontSize:10,textTransform:"uppercase",letterSpacing:1,color:C.muted}}>
            Fila de pedidos
          </div>
          {fila.length===0 &&
            <div style={{padding:20,color:C.muted,textAlign:"center",fontSize:13,marginTop:16}}>
              Nenhum pedido na fila
            </div>}
          {fila.map(ped=>(
            <div key={ped.id} style={{borderBottom:`1px solid ${C.border}`,
              borderLeft:`4px solid ${mesaCor[ped.mesa]||C.yellow}`}}>
              {/* Cabeçalho pedido */}
              <div style={{padding:"7px 10px 4px",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <div style={{background:C.yellow,color:"#000",borderRadius:6,
                  padding:"1px 8px",fontSize:13,fontWeight:900}}>
                  #{ped.id}
                </div>
                <div style={{background:(mesaCor[ped.mesa]||C.yellow)+"33",
                  color:mesaCor[ped.mesa]||C.yellow,
                  borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:700}}>
                  {ped.mesa}
                </div>
                {ped.cliente!=="—"&&
                  <div style={{fontSize:10,color:C.muted,flex:1,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {ped.cliente}
                  </div>}
                <div style={{fontSize:10,color:C.muted}}>{ped.hora}</div>
              </div>
              {/* Itens */}
              {ped.itens.map(it=>{
                const k=`${ped.id}-${it.id}`;
                const on=preparando.includes(k);
                return(
                  <div key={it.id} style={{padding:"5px 10px 6px",
                    display:"flex",alignItems:"center",gap:7,
                    background:on?C.yellow+"11":"transparent"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:on?800:400,
                        color:on?C.yellow:C.text,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {it.item.nome}
                        {it.tamanho&&<span style={{color:C.muted,fontWeight:400,fontSize:10}}> {it.tamanho}</span>}
                      </div>
                      {it.pao&&<div style={{fontSize:10,color:"#A78BFA"}}>🍞 {it.pao}</div>}
                      {it.removidos?.length>0&&
                        <div style={{fontSize:10,color:C.red}}>s/ {it.removidos.join(", ")}</div>}
                      {it.ponto&&<div style={{fontSize:10,color:"#888"}}>🔥 {it.ponto}</div>}
                    </div>
                    <button onClick={()=>toggle(ped.id,it.id)} style={{
                      background:on?C.yellow:"#2A2A2A",border:"none",borderRadius:6,
                      color:on?"#000":C.muted,padding:"4px 8px",
                      cursor:"pointer",fontSize:10,fontWeight:800,whiteSpace:"nowrap"}}>
                      {on?"▶ Fazendo":"▶ Iniciar"}
                    </button>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        {/* TELA PRINCIPAL */}
        <div style={{flex:1,overflowY:"auto",padding:14}}>
          {emPreparo.length===0 ?
            <div style={{height:"100%",display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",gap:12,color:C.muted}}>
              <div style={{fontSize:52}}>🍳</div>
              <div style={{fontSize:16}}>Clique em "Iniciar" na fila ao lado</div>
              <div style={{fontSize:13}}>Os ingredientes aparecem aqui</div>
            </div>
          :
            <div style={{display:"grid",gridTemplateColumns:cols,gap:12}}>
              {emPreparo.map(({ped,it})=>(
                <CardPreparo key={`${ped.id}-${it.id}`} ped={ped} it={it}
                  cor={mesaCor[ped.mesa]||C.yellow}
                  onFinalizar={()=>finalizar(ped.id,it.id)}/>
              ))}
            </div>}
        </div>
      </div>
    </div>
  );
}

function CardPreparo({ped,it,cor,onFinalizar}){
  return(
    <div style={{background:C.card,borderRadius:16,border:`2px solid ${cor}`,
      padding:14,display:"flex",flexDirection:"column",gap:10}}>
      {/* Número do pedido em destaque */}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{background:C.yellow,color:"#000",borderRadius:8,
          padding:"4px 14px",fontSize:24,fontWeight:900,letterSpacing:-1,lineHeight:1}}>
          #{ped.id}
        </div>
        <div style={{flex:1}}>
          <div style={{background:cor+"33",color:cor,borderRadius:6,
            padding:"2px 8px",fontSize:12,fontWeight:700,display:"inline-block"}}>
            {ped.mesa}
          </div>
          {ped.cliente!=="—"&&
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{ped.cliente}</div>}
        </div>
        <div style={{fontSize:11,color:C.muted}}>{ped.hora}</div>
      </div>
      {/* Nome do lanche */}
      <div style={{fontWeight:900,fontSize:18,color:C.yellow,lineHeight:1,
        borderBottom:`1px solid ${C.border}`,paddingBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span>{it.item.nome}</span>
          {it.eBebida && it.qtdBebida>1 &&
            <span style={{background:"#4ECDC422",color:"#4ECDC4",borderRadius:8,
              padding:"2px 10px",fontSize:16,fontWeight:900}}>x{it.qtdBebida}</span>}
        </div>
        {it.tamanho&&<span style={{color:C.muted,fontWeight:400,fontSize:13}}> — {it.tamanho}</span>}
        {it.item.sub&&<div style={{color:C.muted,fontWeight:400,fontSize:12,marginTop:2}}>{it.item.sub}</div>}
      </div>
      {/* Tags de preparo */}
      {(it.pao||it.hamburguer||it.ponto)&&
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {it.pao        &&<PTag c="#A78BFA">🍞 Pão {it.pao}</PTag>}
          {it.hamburguer &&<PTag c="#F59E0B">🥩 {it.hamburguer}</PTag>}
          {it.ponto      &&<PTag c="#FB923C">🔥 {it.ponto}</PTag>}
        </div>}
      {/* Copos para bebidas */}
      {it.eBebida && it.copos?.some(c=>c.qtd>0) &&
        <div style={{background:"#4ECDC411",border:"1px solid #4ECDC444",
          borderRadius:10,padding:"10px 12px",display:"flex",flexDirection:"column",gap:6}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:"#4ECDC4",marginBottom:2}}>
            🧊 Copos e acompanhamentos
          </div>
          {it.copos.filter(c=>c.qtd>0).map(c=>(
            <div key={c.tipo} style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:20,fontWeight:900,color:"#4ECDC4",minWidth:28}}>{c.qtd}×</span>
              <span style={{fontSize:14,color:C.text,fontWeight:600}}>{c.tipo}</span>
            </div>
          ))}
        </div>}
      {/* Ingredientes */}
      {it.ing.length>0 ?
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,
            color:C.muted,marginBottom:2}}>Ingredientes</div>
          {it.item.ing.map(ing=>{
            const rem=it.removidos?.includes(ing);
            return(
              <div key={ing} style={{display:"flex",alignItems:"center",gap:9,
                padding:"7px 11px",borderRadius:9,
                background:rem?C.red+"14":C.green+"0E",
                border:`1px solid ${rem?C.red+"44":C.green+"28"}`}}>
                <span style={{fontSize:14}}>{rem?"✕":"✓"}</span>
                <span style={{fontSize:14,fontWeight:600,flex:1,
                  color:rem?C.red:C.text,textDecoration:rem?"line-through":"none"}}>
                  {ing}
                </span>
                {rem&&<span style={{fontSize:10,color:C.red,fontWeight:900}}>RETIRAR</span>}
              </div>
            );
          })}
        </div>
      :
        <div style={{color:C.muted,fontSize:13,fontStyle:"italic"}}>Sem ingredientes específicos</div>}
      {/* Observações */}
      {it.obs&&
        <div style={{background:"#FBBF2418",border:"1px solid #FBBF2444",
          borderRadius:9,padding:"7px 10px",color:"#FDE68A",fontSize:12,fontWeight:600}}>
          📝 {it.obs}
        </div>}
      {/* Alerta remoções */}
      {it.removidos?.length>0&&
        <div style={{background:C.red+"14",border:`1px solid ${C.red}44`,
          borderRadius:9,padding:"7px 11px",color:C.red,fontSize:12,fontWeight:800}}>
          ⚠️ SEM: {it.removidos.join(", ")}
        </div>}
      <button onClick={onFinalizar} style={{
        background:C.green,border:"none",borderRadius:10,padding:"13px",
        color:"#fff",fontWeight:900,fontSize:14,cursor:"pointer",marginTop:"auto"}}>
        ✓ Lanche Pronto!
      </button>
    </div>
  );
}

// ── AUTOCOMPLETE CLIENTE
function ClienteAutocomplete({value,clientes,onChange,onSelect}){
  const [aberto,setAberto] = useState(false);
  const sugestoes = value.length>0
    ? clientes.filter(c=>c.nome.toLowerCase().includes(value.toLowerCase())).slice(0,6)
    : [];
  return(
    <div style={{position:"relative",marginTop:8}}>
      <input value={value}
        onChange={e=>{onChange(e.target.value);setAberto(true);}}
        onFocus={()=>setAberto(true)}
        onBlur={()=>setTimeout(()=>setAberto(false),150)}
        placeholder="Nome do cliente…"
        style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,
          borderRadius:8,padding:"8px 11px",color:C.text,fontSize:14,
          boxSizing:"border-box",outline:"none"}}/>
      {aberto && sugestoes.length>0 &&
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:99,
          background:C.card,border:`1px solid ${C.yellow}`,borderRadius:10,
          overflow:"hidden",marginTop:3,boxShadow:"0 8px 24px #0006"}}>
          {sugestoes.map(c=>(
            <button key={c.id} onMouseDown={()=>{onSelect(c);setAberto(false);}} style={{
              width:"100%",padding:"10px 13px",background:"none",border:"none",
              borderBottom:`1px solid ${C.border}`,cursor:"pointer",textAlign:"left",
              display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:C.yellow}}>{c.nome}</div>
                {c.cel&&<div style={{fontSize:11,color:C.muted}}>{c.cel}</div>}
              </div>
              {c.historico.length>0 &&
                <span style={{fontSize:10,color:C.muted,background:C.card2,
                  borderRadius:10,padding:"1px 6px"}}>
                  {c.historico.length} pedidos
                </span>}
            </button>
          ))}
        </div>}
    </div>
  );
}

// ── EDITOR DE BEBIDAS (unidades + copos/acompanhamentos)
function BebidaEditor({ativo,setAtivo}){
  function setQtdBebida(n){
    setAtivo(a=>({...a, qtdBebida:Math.max(1,n)}));
  }
  function setCopo(tipo,n){
    setAtivo(a=>({
      ...a,
      copos: a.copos.map(c=>c.tipo===tipo ? {...c,qtd:Math.max(0,n)} : c)
    }));
  }
  const totalCopos = ativo.copos.reduce((s,c)=>s+c.qtd,0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Quantidade de bebidas */}
      <Sec title="Quantidade de bebidas">
        <div style={{display:"flex",alignItems:"center",gap:0,marginTop:6}}>
          <BtnQtd onClick={()=>setQtdBebida(ativo.qtdBebida-1)} disabled={ativo.qtdBebida<=1}>−</BtnQtd>
          <div style={{minWidth:52,textAlign:"center",fontSize:22,fontWeight:900,color:C.yellow}}>
            {ativo.qtdBebida}
          </div>
          <BtnQtd onClick={()=>setQtdBebida(ativo.qtdBebida+1)}>+</BtnQtd>
        </div>
      </Sec>

      {/* Copos / acompanhamentos */}
      <Sec title={`Copos e acompanhamentos${totalCopos>0?" ("+totalCopos+" copos)":""}`}>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:6}}>
          {ativo.copos.map(c=>(
            <div key={c.tipo} style={{display:"flex",alignItems:"center",gap:10,
              background:c.qtd>0?C.yellowDim:C.bg,
              border:`1px solid ${c.qtd>0?C.yellow:C.border}`,
              borderRadius:10,padding:"8px 12px"}}>
              <div style={{flex:1}}>
                <span style={{fontSize:14,fontWeight:c.qtd>0?700:400,
                  color:c.qtd>0?C.yellow:C.text}}>
                  {c.tipo==="Puro"?"🥤":"🧊"} {c.tipo}
                </span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:0}}>
                <BtnQtd onClick={()=>setCopo(c.tipo,c.qtd-1)} disabled={c.qtd<=0}>−</BtnQtd>
                <div style={{minWidth:36,textAlign:"center",fontSize:18,fontWeight:800,
                  color:c.qtd>0?C.yellow:C.muted}}>{c.qtd}</div>
                <BtnQtd onClick={()=>setCopo(c.tipo,c.qtd+1)}>+</BtnQtd>
              </div>
            </div>
          ))}
        </div>
        <div style={{marginTop:8,fontSize:11,color:C.muted,fontStyle:"italic"}}>
          Cada tipo de copo é independente da quantidade de bebidas
        </div>
      </Sec>
    </div>
  );
}

function BtnQtd({children,onClick,disabled}){
  return(
    <button onClick={onClick} disabled={disabled} style={{
      width:36,height:36,borderRadius:8,border:`1px solid ${C.border}`,
      background:disabled?C.card2:C.card,
      color:disabled?C.muted:C.yellow,
      cursor:disabled?"not-allowed":"pointer",
      fontSize:20,fontWeight:800,
      display:"flex",alignItems:"center",justifyContent:"center",
      flexShrink:0}}>
      {children}
    </button>
  );
}

// ── EDITOR DE INGREDIENTES (remover + adicionar com busca)
function IngredientesEditor({ativo,setAtivo}){
  const [abrirAdd,setAbrirAdd] = useState(false);
  const [busca,setBusca]       = useState("");

  // ingredientes do lanche original que ainda estão ativos
  const originais = ativo.item.ing;
  // ingredientes adicionados pelo garçom (não estavam no original)
  const adicionados = ativo.ing.filter(i=>!originais.includes(i));

  const disponiveis = TODOS_INGREDIENTES.filter(i=>
    !ativo.ing.includes(i) &&
    i.toLowerCase().includes(busca.toLowerCase())
  );

  function toggleOriginal(ing){
    const on=ativo.ing.includes(ing);
    setAtivo(a=>({...a,ing:on?a.ing.filter(x=>x!==ing):[...a.ing,ing]}));
  }
  function addIngrediente(ing){
    setAtivo(a=>({...a,ing:[...a.ing,ing]}));
    setBusca("");
  }
  function removerAdicionado(ing){
    setAtivo(a=>({...a,ing:a.ing.filter(x=>x!==ing)}));
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* Ingredientes originais */}
      {originais.length>0 &&
        <div>
          <Lbl>Ingredientes — toque para remover</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:7}}>
            {originais.map(ing=>{
              const on=ativo.ing.includes(ing);
              return(
                <button key={ing} onClick={()=>toggleOriginal(ing)} style={{
                  padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,
                  background:on?C.green+"20":C.red+"18",
                  border:`1.5px solid ${on?C.green:C.red}`,
                  color:on?C.green:C.red,
                  textDecoration:on?"none":"line-through"}}>
                  {on?"✓":"✕"} {ing}
                </button>
              );
            })}
          </div>
        </div>}

      {/* Ingredientes adicionados */}
      {adicionados.length>0 &&
        <div>
          <Lbl>Adicionados</Lbl>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:7}}>
            {adicionados.map(ing=>(
              <button key={ing} onClick={()=>removerAdicionado(ing)} style={{
                padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:600,
                background:"#A78BFA22",border:"1.5px solid #A78BFA",color:"#A78BFA"}}>
                + {ing} ✕
              </button>
            ))}
          </div>
        </div>}

      {/* Botão abrir buscador */}
      <button onClick={()=>setAbrirAdd(!abrirAdd)} style={{
        padding:"9px 14px",borderRadius:10,border:`1.5px dashed ${C.yellow}`,
        background:abrirAdd?C.yellowDim:"transparent",
        color:C.yellow,cursor:"pointer",fontWeight:700,fontSize:13,
        display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
        {abrirAdd?"▲ Fechar":"＋ Adicionar ingrediente"}
      </button>

      {/* Painel de busca */}
      {abrirAdd &&
        <div style={{background:C.bg,border:`1px solid ${C.border}`,
          borderRadius:12,padding:10,display:"flex",flexDirection:"column",gap:8}}>
          <input value={busca} onChange={e=>setBusca(e.target.value)}
            placeholder="🔍 Buscar ingrediente…"
            autoFocus
            style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,
              borderRadius:8,padding:"9px 12px",color:C.text,fontSize:14,
              boxSizing:"border-box",outline:"none"}}/>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:160,overflowY:"auto"}}>
            {disponiveis.length===0 &&
              <div style={{color:C.muted,fontSize:13,padding:6}}>
                {busca?"Nenhum ingrediente encontrado":"Digite para buscar…"}
              </div>}
            {disponiveis.map(ing=>(
              <button key={ing} onClick={()=>addIngrediente(ing)} style={{
                padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",
                background:C.yellow,color:"#000",fontSize:13,fontWeight:700}}>
                + {ing}
              </button>
            ))}
          </div>
        </div>}
    </div>
  );
}

// ── MICRO COMPONENTES
function Lbl({children}){return <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>{children}</div>;}
function Sec({title,children}){return <div><Lbl>{title}</Lbl><div style={{marginTop:7}}>{children}</div></div>;}
function Crd({children,style={}}){return <div style={{background:C.card,borderRadius:12,padding:13,border:`1px solid ${C.border}`,...style}}>{children}</div>;}
function Inp({mt=0,...props}){return <input {...props} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 11px",color:C.text,fontSize:13,boxSizing:"border-box",marginTop:mt,outline:"none"}}/>;}
function Chip({children,ativo,cor,onClick}){return <button onClick={onClick} style={{padding:"5px 11px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:ativo?cor:C.card2,color:ativo?"#000":C.muted}}>{children}</button>;}
function Pill({children,c}){return <span style={{background:c+"22",color:c,borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:600}}>{children}</span>;}
function KTag({children,c}){return <span style={{background:c+"22",color:c,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{children}</span>;}
function PTag({children,c}){return <span style={{background:c+"22",color:c,borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700}}>{children}</span>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
